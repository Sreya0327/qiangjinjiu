<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>将进酒 · 暗阁</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700;900&family=Ma+Shan+Zheng&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#100c0a;--paper:#f0e6d3;--red:#8b2500;--red-bright:#c0392b;--gold:#b8963c;--gold-light:#d4b96a;--ink:#2c1810;--text-mid:#5c4330;--border:#8b7355;--card-bg:#fff8ee}
body{font-family:'Noto Serif SC',serif;background:var(--bg);background-image:radial-gradient(ellipse at 50% 10%,rgba(180,140,60,0.06) 0%,transparent 50%);color:var(--paper);min-height:100vh;overflow-x:hidden}
#bg-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
#app{position:relative;z-index:1;max-width:1000px;margin:0 auto;padding:0 20px;min-height:100vh;display:flex;flex-direction:column}

/* ==== COVER ==== */
#cover{position:fixed;top:0;left:0;width:100%;height:100%;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(ellipse at center,rgba(30,20,12,0.96) 0%,#0a0705 100%);transition:opacity 0.8s}
#cover.out{opacity:0;pointer-events:none}
#cover .seal-r{width:110px;height:110px;border:3px solid var(--red);display:flex;align-items:center;justify-content:center;transform:rotate(-5deg);margin-bottom:24px;animation:sa 1.2s ease-out;box-shadow:0 0 30px rgba(139,37,0,0.3)}
#cover .seal-r span{color:var(--red);font-size:13px;letter-spacing:3px;text-align:center;line-height:2;font-family:'Ma Shan Zheng',cursive}
@keyframes sa{0%{opacity:0;transform:rotate(-5deg) scale(0.5)}60%{transform:rotate(-5deg) scale(1.1)}100%{opacity:1;transform:rotate(-5deg) scale(1)}}
#cover .title-l{display:block;font-size:54px;font-weight:900;letter-spacing:12px;background:linear-gradient(180deg,#f0d890,#c9a96e,#8a6d3b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:tr 1.6s ease-out 0.4s both;text-shadow:0 0 40px rgba(201,169,110,0.3)}
@keyframes tr{0%{opacity:0;letter-spacing:50px;filter:blur(10px)}100%{opacity:1;letter-spacing:12px;filter:blur(0)}}
#cover .sub{font-size:13px;letter-spacing:6px;background:var(--paper);color:var(--ink);display:inline-block;padding:4px 16px;margin-top:12px;animation:fu 1s ease-out 0.8s both;border:1px solid rgba(139,55,0,0.2)}
#cover .dline{width:1px;height:50px;background:linear-gradient(180deg,transparent,var(--gold),transparent);margin:12px 0;animation:fu 1s ease-out 1s both}
#cover .btns{display:flex;flex-direction:column;align-items:center;gap:8px;animation:fu 1s ease-out 1.2s both}
#cover .cbtn{padding:12px 56px;font-size:17px;letter-spacing:6px;cursor:pointer;font-family:inherit;background:transparent;border:1px solid var(--gold);color:var(--gold);transition:all 0.4s}
#cover .cbtn:hover{background:rgba(201,169,110,0.12);box-shadow:0 0 30px rgba(201,169,110,0.2)}
#cover .cbtn.rst{padding:9px 40px;font-size:12px;letter-spacing:3px;border-color:rgba(201,169,110,0.2);color:rgba(201,169,110,0.35)}
#cover .cbtn.rst:hover{border-color:var(--red);color:var(--red-bright)}
#cover .inkd{position:absolute;pointer-events:none;opacity:0.02;font-size:300px;color:#fff;font-family:'Ma Shan Zheng',cursive}
#cover .inkd.t{top:-70px;left:50%;transform:translateX(-50%)}
#cover .inkd.b{bottom:-50px;right:3%}
@keyframes fu{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}

/* ==== HEADER ==== */
#hdr{text-align:center;padding:22px 0 8px;border-bottom:1px solid rgba(184,147,85,0.15);position:relative}
#hdr::after{content:'';position:absolute;bottom:-1px;left:30%;right:30%;height:1px;background:linear-gradient(90deg,transparent,rgba(184,147,85,0.4),transparent)}
#hdr .seal{display:inline-block;border:2px solid var(--red);color:var(--red);padding:5px 14px;font-size:12px;letter-spacing:3px;transform:rotate(-2deg);margin-bottom:5px;font-family:'Ma Shan Zheng',cursive;box-shadow:0 0 8px rgba(139,37,0,0.2)}
#hdr h1{font-size:28px;font-weight:900;letter-spacing:8px;background:linear-gradient(180deg,#e8d5a0,#b8963c,#7a5c20);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
#hdr .sub{font-size:11px;letter-spacing:4px;background:var(--paper);color:var(--ink);display:inline-block;padding:2px 10px;margin-top:2px;border:1px solid rgba(139,55,0,0.12)}

/* ==== NAV ==== */
#toprow{display:flex;justify-content:space-between;align-items:center;padding:8px 0;font-size:11px;color:rgba(255,255,255,0.4);flex-wrap:wrap;gap:6px}
#toprow span{color:var(--gold);font-weight:600;font-size:12px}
#casebar{display:flex;align-items:center;gap:5px;padding:4px 0;flex-wrap:wrap}
#casebar .csb{padding:4px 9px;font-size:10px;letter-spacing:1px;background:rgba(255,255,255,0.03);border:1px solid rgba(184,147,85,0.12);color:rgba(255,255,255,0.4);cursor:pointer;font-family:inherit;transition:all 0.3s;border-radius:2px}
#casebar .csb:hover{border-color:var(--gold);color:var(--gold-light)}
#casebar .csb.on{border-color:var(--red);color:var(--gold);background:rgba(139,37,0,0.08)}
#casebar .csb.done{border-color:var(--gold);color:var(--gold)}
#casebar .csb.done::after{content:' ✓';font-size:8px;color:#5cb85c}
#sfwrap{padding:2px 0 8px}
#sfwrap select{padding:4px 8px;font-size:11px;background:rgba(0,0,0,0.3);border:1px solid rgba(184,147,85,0.15);color:var(--paper);font-family:inherit;min-width:160px;border-radius:2px;outline:none}

/* ==== TABS ==== */
#tabs{display:flex;border-bottom:1px solid rgba(184,147,85,0.1);align-items:center}
.tab{padding:8px 16px;cursor:pointer;font-size:12px;letter-spacing:1px;color:rgba(255,255,255,0.3);border-bottom:2px solid transparent;transition:all 0.3s;background:transparent;border-top:none;border-left:none;border-right:none;font-family:inherit}
.tab:hover{color:var(--gold-light)}
.tab.on{color:var(--gold);border-bottom-color:var(--red)}
.tab.mtab{margin-left:auto;color:rgba(216,180,120,0.5);font-weight:600}
.tab.mtab.on{color:var(--gold-light);border-bottom-color:var(--gold)}

/* ==== CONTENT ==== */
#ctn{flex:1;padding:10px 0}
.pnl{display:none;animation:fi 0.35s ease}.pnl.on{display:block}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Dossier */
.dcard{background:linear-gradient(135deg,var(--card-bg),#f5ead5);border:1px solid var(--border);border-radius:4px;padding:24px 26px;margin-bottom:14px;color:var(--ink);box-shadow:0 3px 18px rgba(0,0,0,0.3);position:relative}
.dcard::before{content:'';position:absolute;top:6px;left:6px;right:6px;bottom:6px;border:1px solid rgba(139,37,0,0.05);pointer-events:none}
.dcard .stamp{position:absolute;top:14px;right:14px;border:2px solid var(--red);color:var(--red);padding:3px 8px;font-size:10px;letter-spacing:2px;transform:rotate(8deg);opacity:0.5;font-family:'Ma Shan Zheng',cursive}
.dcard .cid{font-size:10px;color:var(--text-mid);letter-spacing:2px;border-bottom:1px dashed var(--border);padding-bottom:5px;margin-bottom:10px}
.dcard h2{font-size:18px;font-weight:700;letter-spacing:2px;margin-bottom:2px}
.dcard .cs{font-size:11px;color:var(--red);margin-bottom:10px}
.dcard .nt{line-height:2.1;font-size:13px;text-align:justify}
.dcard .nt p{margin-bottom:12px;text-indent:2em}
.dcard .nt .hi{color:var(--red-bright);font-weight:600}
.dcard .nt .gld{color:#8b6914;font-weight:600}
.dcard .nt .cf{display:inline-block;background:rgba(139,37,0,0.05);border:1px dashed var(--red);padding:2px 6px;margin:2px 3px;font-size:11px;color:var(--red);letter-spacing:1px}
.cblock{margin-top:14px;padding-top:10px;border-top:1px dashed var(--border)}
.cblock .clbl{font-size:10px;color:var(--text-mid);letter-spacing:2px;margin-bottom:6px}
.dbtn{display:block;width:100%;padding:9px 14px;margin-bottom:4px;background:rgba(184,147,85,0.04);border:1px solid var(--border);color:var(--ink);text-align:left;font-family:inherit;font-size:12px;cursor:pointer;letter-spacing:1px;transition:all 0.3s;border-radius:2px}
.dbtn:hover{background:rgba(184,147,85,0.12);border-color:var(--gold);padding-left:18px}
.dbtn::before{content:'▸ ';color:var(--red);font-size:9px}

/* Map */
#mc{position:relative;width:100%;border:1px solid rgba(139,100,60,0.25);border-radius:4px;overflow:hidden;background:#e8dcc8}
#mapc{display:block;width:100%}
#mtt{position:absolute;pointer-events:none;background:rgba(20,15,10,0.96);border:1px solid var(--gold);padding:6px 10px;font-size:10px;color:var(--gold);letter-spacing:1px;border-radius:2px;display:none;z-index:10;white-space:nowrap}
#minfo{background:rgba(0,0,0,0.15);border:1px solid rgba(184,147,85,0.15);border-radius:4px;padding:16px;margin-top:8px;display:none}
#minfo.show{display:block;animation:fi 0.4s ease}
#minfo .mt{font-size:14px;color:var(--gold);letter-spacing:2px;margin-bottom:2px}
#minfo .ms{font-size:10px;color:rgba(255,255,255,0.25);letter-spacing:1px;margin-bottom:8px}
#minfo .ml{font-size:9px;color:rgba(255,255,255,0.2);margin-bottom:3px}
#minfo .mtag{display:inline-block;padding:2px 8px;margin:2px;background:rgba(184,147,85,0.08);border:1px solid rgba(184,147,85,0.18);color:var(--paper);font-size:10px;letter-spacing:1px;border-radius:2px;cursor:pointer;transition:all 0.3s}
#minfo .mtag:hover{background:rgba(184,147,85,0.16);border-color:var(--gold);color:var(--gold)}
#minfo .mtag.ch{background:rgba(139,37,0,0.06);border-color:rgba(139,37,0,0.2)}
#minfo .mtag.ev{background:rgba(46,139,87,0.04);border-color:rgba(46,139,87,0.18)}

/* Deduction */
.ded-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:6px;margin-bottom:16px}
.clue-c{background:rgba(255,255,255,0.02);border:1px solid rgba(184,147,85,0.1);padding:9px 6px;cursor:pointer;transition:all 0.3s;border-radius:2px;text-align:center;font-size:11px;letter-spacing:1px;min-height:36px;display:flex;align-items:center;justify-content:center}
.clue-c:hover{border-color:var(--gold);background:rgba(184,147,85,0.04)}
.clue-c.sel{border-color:var(--red)!important;background:rgba(139,37,0,0.08)!important;box-shadow:0 0 10px rgba(139,37,0,0.15)}
.clue-c.found{color:var(--paper)}.clue-c.lock{opacity:0.25;cursor:not-allowed;color:rgba(255,255,255,0.1)}
.ded-res{background:rgba(184,147,85,0.04);border:1px solid var(--gold);padding:14px;margin-top:10px;border-radius:2px;display:none;color:var(--paper);line-height:1.9;font-size:13px}
.ded-res.show{display:block}

/* Characters */
.ch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:8px}
.ch-card{background:rgba(255,255,255,0.02);border:1px solid rgba(184,147,85,0.1);padding:14px;border-radius:2px;transition:all 0.3s;cursor:pointer}
.ch-card:hover{border-color:var(--gold);background:rgba(184,147,85,0.04)}
.ch-card h4{font-size:14px;color:var(--gold-light);letter-spacing:1px;margin-bottom:2px}
.ch-card .role{font-size:10px;color:rgba(255,255,255,0.3);margin-bottom:6px}
.ch-card .info{font-size:10px;color:rgba(255,255,255,0.4);line-height:1.7}

/* Decisions */
.dec-card{background:linear-gradient(135deg,rgba(139,37,0,0.04),rgba(0,0,0,0.1));border:1px solid rgba(139,37,0,0.2);padding:16px;margin-bottom:10px;border-radius:2px}
.dec-card .dc{font-size:10px;color:var(--red);margin-bottom:3px}
.dec-card .dq{font-size:13px;color:var(--paper);line-height:1.7}

/* Reports */
.rpt-card{background:rgba(255,255,255,0.01);border:1px solid rgba(184,147,85,0.08);padding:14px;margin-bottom:8px;border-radius:2px;transition:all 0.3s;cursor:pointer}
.rpt-card:hover{border-color:rgba(184,147,85,0.25)}
.rpt-card.lk{opacity:0.3;cursor:not-allowed}
.rpt-card .rf{font-size:9px;color:var(--text-mid);margin-bottom:2px}
.rpt-card .rt{font-size:12px;color:var(--gold-light)}
.rpt-card .rp{font-size:10px;color:rgba(255,255,255,0.25);margin-top:3px}

/* Bottom bar */
#bbar{display:flex;justify-content:space-between;padding:8px 0;border-top:1px solid rgba(184,147,85,0.08);font-size:10px;color:rgba(255,255,255,0.28);margin-top:12px;flex-wrap:wrap;gap:4px}
#bbar .bv{color:var(--gold);font-weight:600}

/* Toast */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--gold);padding:8px 16px;border:1px solid var(--gold);font-size:11px;letter-spacing:2px;z-index:200;animation:ti 0.4s ease,to 0.4s ease 2.2s forwards;border-radius:2px;pointer-events:none}
@keyframes ti{from{opacity:0;transform:translateX(-50%) translateY(-20px)}}@keyframes to{to{opacity:0;transform:translateX(-50%) translateY(-20px)}}

/* Modal */
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:300;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.3s}
.modal-overlay.show{opacity:1;pointer-events:all}
.modal-box{background:linear-gradient(135deg,#1a1512,#231d14);border:1px solid var(--gold);padding:28px;max-width:500px;width:90%;border-radius:4px;position:relative;box-shadow:0 8px 40px rgba(0,0,0,0.5)}
.modal-box .mclose{position:absolute;top:10px;right:14px;background:none;border:none;color:rgba(255,255,255,0.4);font-size:20px;cursor:pointer;font-family:inherit}
.modal-box .mclose:hover{color:var(--gold)}
.modal-box h3{font-size:18px;color:var(--gold-light);letter-spacing:3px;margin-bottom:4px}
.modal-box .mrole{font-size:11px;color:rgba(255,255,255,0.3);margin-bottom:12px}
.modal-box .minfo{font-size:13px;color:rgba(255,255,255,0.65);line-height:2.2;letter-spacing:1px}

/* Exit & Panel toggles */
#exitb{position:fixed;top:12px;left:16px;z-index:50;padding:4px 10px;font-size:10px;cursor:pointer;font-family:inherit;background:rgba(0,0,0,0.4);border:1px solid rgba(184,147,85,0.15);color:rgba(255,255,255,0.3);border-radius:2px;transition:all 0.3s;display:none}
#exitb:hover{background:rgba(139,37,0,0.2);border-color:var(--red);color:var(--red-bright)}
#rptg{position:fixed;top:12px;right:16px;z-index:50;display:none;gap:4px}
#rptg button{padding:4px 10px;font-size:10px;cursor:pointer;font-family:inherit;background:rgba(0,0,0,0.4);border:1px solid rgba(184,147,85,0.15);color:rgba(255,255,255,0.3);border-radius:2px;transition:all 0.3s}
#rptg button:hover{background:rgba(184,147,85,0.1);border-color:var(--gold);color:var(--gold)}

/* Right Panel */
#rpanel{position:fixed;top:0;right:-400px;width:380px;height:100%;z-index:60;background:rgba(16,12,10,0.98);border-left:1px solid rgba(184,147,85,0.18);transition:right 0.4s ease;overflow-y:auto;padding:20px;box-shadow:-5px 0 30px rgba(0,0,0,0.5)}
#rpanel.open{right:0}
#rpanel .rpc{position:absolute;top:10px;right:14px;background:none;border:none;color:rgba(255,255,255,0.35);font-size:18px;cursor:pointer}
#rpanel .rpc:hover{color:var(--gold)}
#rpanel .rpt{font-size:14px;color:var(--gold);letter-spacing:2px;margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid rgba(184,147,85,0.1)}
#rpanel .rptabs{display:flex;margin-bottom:10px}
#rpanel .rtab{padding:5px 12px;font-size:10px;cursor:pointer;font-family:inherit;background:none;border:none;color:rgba(255,255,255,0.3);border-bottom:1px solid transparent;transition:all 0.3s}
#rpanel .rtab:hover{color:var(--gold)}
#rpanel .rtab.on{color:var(--gold);border-bottom-color:var(--red)}
#rpanel .rpcnt{display:none}#rpanel .rpcnt.on{display:block}

.rp-chi{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.03);cursor:pointer;transition:all 0.2s}
.rp-chi:hover{background:rgba(184,147,85,0.04)}
.rp-chi .nm{color:var(--gold-light);font-size:13px}
.rp-chi .rl{font-size:9px;color:rgba(255,255,255,0.28)}

.rp-tl{position:relative;padding-left:16px}
.rp-tl::before{content:'';position:absolute;left:3px;top:0;bottom:0;width:1px;background:rgba(184,147,85,0.15)}
.rp-tli{padding:4px 0 12px 12px;position:relative;font-size:11px;color:rgba(255,255,255,0.4)}
.rp-tli::before{content:'';position:absolute;left:-15px;top:8px;width:6px;height:6px;border-radius:50%;background:var(--gold)}
.rp-tli.done::before{background:#5cb85c}
.rp-tli .tl{color:var(--gold);font-weight:600;font-size:12px}
.rp-tli .ts{font-size:9px;color:rgba(255,255,255,0.2)}

.rp-rel{padding:6px 0;font-size:11px;color:rgba(255,255,255,0.5)}
.rp-rel .rleft{color:var(--gold-light)}
.rp-rel .redge{color:rgba(255,255,255,0.2);margin:0 6px}
.rp-rel .rtype{font-size:9px;color:var(--red);border:1px solid rgba(139,37,0,0.3);padding:1px 5px;border-radius:2px;margin-left:6px}

/* ==== RESPONSIVE ==== */
@media(max-width:1024px){
  #app{max-width:100%;padding:0 14px}
  #hdr h1{font-size:24px;letter-spacing:6px}
  #hdr .seal{padding:4px 10px;font-size:10px}
  .dcard{padding:20px}
  .dcard h2{font-size:16px}
  .dcard .nt{font-size:12px;line-height:1.9}
  .ch-grid{grid-template-columns:repeat(auto-fill,minmax(155px,1fr))}
  .ded-grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr))}
}
@media(max-width:768px){
  #cover .title-l{font-size:40px;letter-spacing:8px}
  @keyframes tr{0%{opacity:0;letter-spacing:28px;filter:blur(5px)}100%{opacity:1;letter-spacing:8px;filter:blur(0)}}
  #cover .seal-r{width:90px;height:90px}
  #cover .seal-r span{font-size:11px}
  #cover .sub{font-size:11px;letter-spacing:4px}
  #cover .cbtn{padding:10px 44px;font-size:15px;letter-spacing:4px}
  #cover .cbtn.rst{padding:7px 30px;font-size:10px}
  #hdr h1{font-size:20px;letter-spacing:5px}
  #hdr .sub{font-size:10px;padding:2px 8px}
  #tabs{overflow-x:auto;white-space:nowrap;-webkit-overflow-scrolling:touch}
  .tab{padding:7px 12px;font-size:11px;letter-spacing:1px;flex-shrink:0}
  .tab.mtab{margin-left:0}
  #toprow{font-size:10px;gap:4px}
  #toprow span{font-size:10px}
  .top-val{font-size:11px!important}
  #casebar{overflow-x:auto;flex-wrap:nowrap;white-space:nowrap}
  .csb{padding:3px 7px;font-size:9px;flex-shrink:0}
  #sfwrap select{min-width:130px;font-size:10px}
  .dcard{padding:14px 16px}
  .dcard h2{font-size:15px}
  .dcard .nt{font-size:11px;line-height:1.8}
  .dcard .nt p{text-indent:1.5em;margin-bottom:10px}
  .dcard .stamp{top:10px;right:10px;padding:2px 6px;font-size:8px}
  .dbtn{padding:8px 12px;font-size:11px}
  .dbtn:hover{padding-left:15px}
  .ch-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:6px}
  .ch-card{padding:12px}
  .ch-card h4{font-size:13px}
  .ch-card .role{font-size:9px}
  .ch-card .info{font-size:9px}
  .ded-grid{grid-template-columns:repeat(2,1fr);gap:5px}
  .clue-c{padding:7px 4px;font-size:10px;min-height:30px}
  #rpanel{width:100%;right:-100%}
  #exitb{top:8px;left:8px;padding:3px 8px;font-size:9px}
  #rptg{top:8px;right:8px;gap:3px}
  #rptg button{padding:3px 8px;font-size:9px}
  #map-container{min-height:340px}
  #map-canvas{height:340px!important}
  #mc{background:#e0d4b8}
  .modal-box{padding:18px;width:95%}
  .modal-box h3{font-size:15px}
  .modal-box .minfo{font-size:11px;line-height:1.8}
  #bbar{font-size:9px;gap:3px}
  .toast{font-size:10px;padding:6px 12px;letter-spacing:1px}
  .clue-toast{font-size:10px;padding:6px 12px}
}

// Scene definitions as plain objects
const SC={};
SC['case_chashi_intro']={c:'case_chashi',cn:'茶石关疑案',t:'案牍一：茶石之谜',s:'建兴五年冬 · 中博六州',tx:'<p>建兴五年冬，中博六州。</p><p>茶石关——大周抵御边沙十二部的天险，一夜之间被攻破。守军八千，<span class="hi">全军覆没</span>。</p><p><span class="gld">建兴王沈卫</span>坐镇中博，手握六州兵权，却在茶石关陷落后被指控<span class="hi">私通边沙</span>，致使天险失守。</p><p>唯一的活口，是沈卫的第八子——<span class="gld">沈泽川</span>。他在师兄<span class="gld">纪暮</span>的背负下逃出茶石关，但纪暮因失血过多，死在了风雪之中。</p><p>沈泽川随后被离北军俘虏，押赴阒都受审。</p><p><span class="cf">📌 茶石关陷落</span> <span class="cf">📌 纪暮战死</span> <span class="cf">📌 沈卫通敌指控</span></p>',cl:['c_chashi_fall','c_jimu_death','c_shenwei_treason'],ch:[{t:'翻阅边关战报，核查茶石关布防记录',nx:'case_chashi_detail',n:'深入调查'},{t:'直接查看沈泽川的供词',nx:'case_chashi_testimony',n:'直接取证'}]};
SC['case_chashi_detail']={c:'case_chashi',cn:'茶石关疑案',t:'边关战报 · 茶石关守备录',s:'附：离北军接防记录',tx:'<p>战报显示：茶石关守军八千人，建兴五年十一月初七夜间遭遇突袭。边沙骑兵趁大雪封山之际，从<span class="hi">侧翼小道</span>绕过关隘正门。</p><p>这条小道只有中博高层将领知晓。沈卫作为主帅不可能不知。</p><p>另一份离北军接防记录显示：边沙骑兵撤退后，<span class="gld">离北铁骑</span>迅速接管了防线。离北王次子萧驰野亲率三千精骑，连夜奔袭百里，稳定了中博局势。</p><p><span class="cf">📌 离北军接防</span> <span class="cf">📌 唯一活口</span></p>',cl:['c_libei_arrive','c_shen_survivor'],ch:[{t:'继续查阅沈泽川的审讯记录',nx:'case_chashi_testimony',n:''}]};
SC['case_chashi_testimony']={c:'case_chashi',cn:'茶石关疑案',t:'供词摘录 · 沈泽川',s:'建兴五年十一月十五 · 阒都大理寺',tx:'<p>"罪臣之子沈泽川，叩见陛下。"</p><p>供词中沈泽川陈述前后矛盾。他先说"不知父亲是否通敌"，后又说"茶石关之事另有隐情"。</p><p>审问官批注：<span class="hi">此人言语闪烁，似有所隐瞒。受刑后依然未改口，骨气非凡。</span></p><p><span class="gld">太后花氏</span>力主斩草除根。朝中有力量在保沈泽川。</p><p>沈泽川被免死罪，处廷杖三十，押入<span class="gld">昭罪寺</span>。</p><p><span class="cf">📌 廷杖三十</span> <span class="cf">📌 太后干政</span> <span class="cf">📌 花党权势</span></p>',cl:['c_court_beat','c_empress_dowager','c_hua_faction'],ch:[{t:'【案牍完结】前往昭罪寺秘闻',nx:'case_temple_intro',n:'茶石关案完',cc:'case_chashi'}]};
SC['case_temple_intro']={c:'case_temple',cn:'昭罪寺秘闻',t:'案牍二：昭罪寺',s:'建兴五年腊月 · 阒都',tx:'<p><span class="gld">昭罪寺</span>——阒都最阴冷之处。关押着朝堂斗争的失败者与失势官员。</p><p>沈泽川被押入时浑身是伤，奄奄一息。但在这里，他遇到了两个改变他命运的人。</p><p>一个是<span class="gld">纪纲</span>——授业恩师，师兄纪暮的父亲。一个是<span class="gld">齐太傅</span>——被废的太子太傅，囚禁近二十年。</p><p>纪纲教他武功，齐太傅教他权谋。一文一武，开始了对沈泽川的精心打磨。</p><p><span class="cf">📌 昭罪寺</span></p>',cl:['c_zhaozui_temple'],ch:[{t:'查阅纪纲的资料',nx:'case_temple_jigang',n:''},{t:'查阅齐太傅的资料',nx:'case_temple_qitaifu',n:''}]};
SC['case_temple_jigang']={c:'case_temple',cn:'昭罪寺秘闻',t:'人物档案 · 纪纲',s:'前建兴王府武师 | 纪家拳传人',tx:'<p><span class="gld">纪纲</span>，原建兴王府武师。相貌被火烧毁，面目狰狞，沉默寡言，忠义无双。</p><p>祖传<span class="gld">纪家拳法</span>本是沈卫亲授。如今他用这套拳法教沈泽川——一种轮回，一场宿命。</p><p>独子纪暮为救沈泽川而死。但纪纲从未流泪。他只是更沉默地教拳、煎药、守夜。</p><p><span class="cf">📌 师父纪纲</span> <span class="cf">📌 纪家拳法</span></p>',cl:['c_jigang_master','c_ji_quan'],ch:[{t:'查阅齐太傅的资料',nx:'case_temple_qitaifu',n:''}]};
SC['case_temple_qitaifu']={c:'case_temple',cn:'昭罪寺秘闻',t:'人物档案 · 齐太傅',s:'前太子太傅 | 帝王之术传人',tx:'<p><span class="gld">齐惠连</span>，大周太子之师，因太子被废受牵连。</p><p>在昭罪寺中度过了漫长岁月——从壮年到白发，直到沈泽川出现。</p><p>"水满则溢，月盈则亏。帝王之术，便是控制水与月的平衡。"</p><p>他教沈泽川<span class="hi">《帝策》</span>和<span class="hi">《权经》</span>。</p><p><span class="cf">📌 齐太傅</span></p>',cl:['c_qi_taifu'],ch:[{t:'【案牍完结】前往离北来使',nx:'case_encounter_intro',n:'昭罪寺案完',cc:'case_temple'}]};
SC['case_encounter_intro']={c:'case_encounter',cn:'离北来使',t:'案牍三：初遇',s:'建兴六年春 · 昭罪寺',tx:'<p>建兴六年春，离北军入都。</p><p><span class="gld">萧驰野</span>——离北王次子，率三千铁骑奔袭千里，声名鹊起。但离北王已战死，如今支撑离北的是萧驰野和兄长萧既明。</p><p>萧驰野第一次来到昭罪寺时，沈泽川正在院中练拳。</p><p>四目相对的那一刻，<span class="hi">命运的齿轮开始转动</span>。</p><p><span class="cf">📌 萧驰野入都</span></p>',cl:['c_xiao_arrives'],ch:[{t:'调阅昭罪寺当日的守卫记录',nx:'case_encounter_detail',n:''},{t:'查看萧驰野的军中档案',nx:'case_encounter_xiao',n:''}]};
SC['case_encounter_detail']={c:'case_encounter',cn:'离北来使',t:'昭罪寺守卫录',s:'当值：王虎 | 异常记录：有',tx:'<p>守卫记录：当日午后一名"离北军官"以"巡查防务"为名进入昭罪寺。</p><p>离北军并无此权限。萧驰野是<span class="hi">擅自闯入</span>。</p><p>守卫王虎记录：<span class="hi">"那人体格魁梧，腰佩长刀。在沈泽川院内停留约一炷香，有打斗声传出。离开时嘴角带笑。"</span></p><p><span class="cf">📌 昭罪寺初遇</span></p>',cl:['c_first_meeting'],ch:[{t:'查看萧驰野的军中档案',nx:'case_encounter_xiao',n:''},{t:'探访萧驰野常去的酒楼打听消息',nx:'case_encounter_tavern',n:'追查行踪'}]};
SC['case_encounter_tavern']={c:'case_encounter',cn:'离北来使',t:'东来酒楼 · 银子之困',s:'萧驰野与陆广白、晨阳等人的私下议论',tx:'<p>暗阁探子混入东来酒楼，听到了离北将领的私下谈话。</p><p><span class="gld">陆广白</span>拍着桌子叹气："<span class="hi">离北今年的俸禄还没发齐，弟兄们已经三个月没见饷银了。</span>边关那边，连草料都快买不起！"</p><p><span class="gld">晨阳</span>接着说："阒都户部扣着银子不给，说是中博兵败后税收不足。可我看太后的花党，哪个不是锦衣玉食？"</p><p>萧驰野靠在椅子上，放下酒杯："离北被逼到墙角了。打赢了没赏钱，打输了要问罪。<span class="hi">我爹战死的那天，户部的催粮文书比丧报还先到。</span>"</p><p>沉默许久，陆广白低声说："这阒都，是个吃人不吐骨头的地方。二公子，咱们不能在这里耗着。得找个在朝堂上能说话的人。"</p><p>萧驰野摩挲着刀柄，眼中闪过一丝暗芒。</p><p><span class="cf">📌 离北困境</span></p>',cl:['c_libei_pressure'],ch:[{t:'【案牍完结】前往宫宴风云',nx:'case_banquet_intro',n:'离北来使案完结',cc:'case_encounter'}]};
SC['case_encounter_xiao']={c:'case_encounter',cn:'离北来使',t:'军中档案 · 萧驰野',s:'离北王次子 | 正四品骁骑将军',tx:'<p><span class="gld">萧驰野</span>。离北王萧方旬次子。</p><p>战功：率三千精骑一夜奔袭茶石关。封骁骑将军。</p><p>萧既明评语：<span class="hi">"野性难驯，但心思缜密。善饮酒，更善看人。"</span></p><p>密档附注：萧驰野在阒都频繁出入寺观酒楼，疑似<span class="hi">结交各方势力</span>。昭罪寺之行并非偶然。</p><p><span class="cf">📌 离北困境</span></p>',cl:['c_libei_pressure'],ch:[{t:'调阅昭罪寺当日的守卫记录',nx:'case_encounter_detail',n:''}]};
SC['case_banquet_intro']={c:'case_banquet',cn:'宫宴风云',t:'案牍四：宫宴',s:'建兴六年二月初二 · 太和殿',tx:'<p>咸德帝设宴太和殿，实为各方势力角力。</p><p>沈泽川被押出昭罪寺，立于殿前接受满朝审视。</p><p><span class="gld">太后</span>欲杀他，<span class="gld">花思谦</span>附和。但<span class="gld">陆广白</span>——离北边关大将——站出来为他说了话。</p><p><span class="gld">萧驰野</span>的一句话彻底扭转局势。</p><p><span class="cf">📌 咸德帝宫宴</span></p>',cl:['c_banquet'],ch:[{t:'查看陆广白的发言记录',nx:'case_banquet_lu',n:''},{t:'查看萧驰野的发言记录',nx:'case_banquet_xiao',n:''}]};
SC['case_banquet_lu']={c:'case_banquet',cn:'宫宴风云',t:'宫宴实录 · 陆广白',s:'太和殿起居注',tx:'<p><span class="gld">陆广白</span>奏道：</p><p>"沈泽川没有通敌，杀他名不正言不顺。若只因疑心便杀降臣之子，天下人如何看朝廷？"</p><p>此言代表<span class="hi">整个离北边军</span>的态度。</p><p><span class="cf">📌 陆广白求情</span></p>',cl:['c_lu_guangbai'],ch:[{t:'查看萧驰野的发言记录',nx:'case_banquet_xiao',n:''}]};
SC['case_banquet_xiao']={c:'case_banquet',cn:'宫宴风云',t:'宫宴实录 · 萧驰野',s:'太和殿起居注',tx:'<p>太后与花党步步紧逼时，<span class="gld">萧驰野</span>开口：</p><p>"关起来，不如放出来。关在笼子里的老虎，咬人更疼。"</p><p>表面说"放人"，实则是<span class="hi">对太后的含蓄警告</span>。</p><p>起居注官记录：<span class="hi">"萧二公子言毕，太后面色微变。殿中落针可闻。"</span></p><p>沈泽川保住性命，被严令不得踏出昭罪寺。</p>',ch:[{t:'查看萧驰野被分配巡防营的调令',nx:'case_banquet_assign',n:''},{t:'【案牍完结】前往雪夜密会',nx:'case_snow_intro',n:'宫宴案完',cc:'case_banquet'}]};
SC['case_banquet_assign']={c:'case_banquet',cn:'宫宴风云',t:'密议 · 巡防营调令',s:'宫宴后 · 咸德帝偏殿',tx:'<p>宫宴散后，咸德帝单独召见了萧驰野。</p><p>咸德帝坐在龙椅上，神色疲惫："<span class="hi">离北的困境朕知道。但朝中诸事，朕一人说了不算。</span>太后那边……"他没有说下去。</p><p>萧驰野单膝跪地："陛下，离北不要封赏，只求一条活路。"</p><p>咸德帝沉默许久，提笔写了一道调令：<span class="gld">命萧驰野暂领阒都巡防营，巡查都城治安，协管各寺观衙署。</span></p><p>"这巡防营的差事，"咸德帝低声说，"可以让你在阒都各处走动。包括——昭罪寺。"</p><p>萧驰野接过调令，嘴角微微上扬。皇帝在借他的手，试探太后的底线。</p><p>而他也需要这个机会——<span class="hi">可以名正言顺地再去见那个人。</span></p>',ch:[{t:'【案牍完结】前往雪夜密会',nx:'case_snow_intro',n:'宫宴案完结',cc:'case_banquet'}]};
SC['case_snow_intro']={c:'case_snow',cn:'雪夜密会',t:'案牍五：雪夜',s:'建兴六年二月十五 · 昭罪寺',tx:'<p>宫宴后十余日，阒都大雪。</p><p>深夜，昭罪寺院墙上翻进来一个人——<span class="gld">萧驰野</span>。他喝了酒，浑身酒气，眼神亮得惊人。</p><p>不走正门，不通报姓名，直接翻墙而入。<span class="hi">一场私人的拜访。</span></p><p>沈泽川正在院中练拳。两人雪中对峙，月光拉长了影子。</p><p><span class="cf">📌 雪夜私访</span></p>',cl:['c_snow_night'],ch:[{t:'以沈泽川的视角体验这个夜晚',nx:'case_snow_shen',n:'',ad:0},{t:'以萧驰野的视角体验这个夜晚',nx:'case_snow_xiao',n:'',ad:0}]};
SC['case_snow_shen']={c:'case_snow',cn:'雪夜密会',t:'雪夜 · 沈泽川视角',s:'昭罪寺 · 子时',tx:'<p>"萧二公子深夜来访，有何贵干？"你的声音比雪还冷。</p><p>他靠在墙上看了你很久。然后他动了——快得像离弦的箭。你拼尽全力招架，他一脚踢在你胸口。</p><p>月光下他眼里是<span class="hi">认真而危险的审视</span>。</p>',ch:[{t:'挣扎爬起来再次摆出拳架',nx:'case_snow_fight',n:'不屈不挠',ad:10},{t:'冷冷说："杀了我就能在太后面前邀功？"',nx:'case_snow_words',n:'言语反击',ad:5}]};
SC['case_snow_xiao']={c:'case_snow',cn:'雪夜密会',t:'雪夜 · 萧驰野视角',s:'昭罪寺 · 子时',tx:'<p>你翻过那道墙时想：<span class="gld">沈泽川，你到底是个什么样的人？</span></p><p>宫宴上他低头那一瞬，你看清了他眼里的东西——不是恐惧，是克制的、等待时机的冷静。</p><p>这不像阶下囚。这像一柄还没出鞘的刀。</p><p>他倒下后看你的眼神——<span class="hi">让你心里某个地方被触动了。</span></p>',ch:[{t:'故意激怒他看能做到什么程度',nx:'case_snow_fight',n:'试探',ad:10},{t:'收手认真地问他："你恨谁？"',nx:'case_snow_question',n:'真诚',ad:12}]};
SC['case_snow_fight']={c:'case_snow',cn:'雪夜密会',t:'雪夜 · 交锋',s:'昭罪寺 · 子时',tx:'<p>你再次扑上去。萧驰野一把扣住你的手，五指像铁钳。</p><p>"够狠。"他低声说，"我喜欢。"</p><p>你猛地低头一口咬在他虎口上。他没有抽手。</p><p>血顺着唇角流下。然后他笑了。</p><p>"老子记住你了，沈泽川。"</p><p><span class="cf">📌 咬痕</span></p>',cl:['c_bite_scar'],ch:[{t:'【全部案牍完结】查看终章',nx:'case_ending',n:'全案完结',cc:'case_snow'}]};
SC['case_snow_question']={c:'case_snow',cn:'雪夜密会',t:'雪夜 · 一问',s:'昭罪寺 · 子时',tx:'<p>"你恨谁？"萧驰野收手认真看着你。</p><p>你沉默很久："我恨的人很多。你想听哪个？"</p><p>他笑了，伸手把你拽起来。"一个一个说。我有的是时间。"</p><p>他虎口上有血。但他似乎不在意。</p><p><span class="cf">📌 咬痕</span></p>',cl:['c_bite_scar'],ch:[{t:'【全部案牍完结】查看终章',nx:'case_ending',n:'全案完结',cc:'case_snow'}]};
SC['case_snow_words']={c:'case_snow',cn:'雪夜密会',t:'雪夜 · 言辞',s:'昭罪寺 · 子时',tx:'<p>"杀了我就能在太后面前邀功了？"</p><p>萧驰野掐你喉咙的手顿了顿。他低声笑了。</p><p>"邀功？我要是想拿你邀功，宫宴上就不会开那个口。"</p><p>你咬了上去。他没有躲。</p><p>"够狠。老子记住你了，沈泽川。"</p><p><span class="cf">📌 咬痕</span></p>',cl:['c_bite_scar'],ch:[{t:'【全部案牍完结】查看终章',nx:'case_ending',n:'全案完结',cc:'case_snow'}]};
SC['case_ending']={c:'case_ending',cn:'卷终',t:'暗阁 · 卷一完结',s:'甲字第七号 · 沈萧秘卷',tx:'<p>五卷案牍，至此封存。从茶石关的血雪到雪地咬痕——<span class="gld">沈泽川</span>与<span class="gld">萧驰野</span>第一卷命运已毕。</p><p style="text-align:center;font-size:16px;letter-spacing:4px;color:var(--red);margin:12px 0;">—— 卷一 · 阒都风云 · 封 ——</p><p style="color:var(--gold);">全书282章 · 暗阁谨识</p>',ch:[{t:'【进入卷二】暗流涌动 · 春闱之变',nx:'v2_intro',n:'卷二开始'},{t:'重览卷一（重新开始）',nx:'case_chashi_intro',n:'',rst:true}]};

// === VOLUME 2: 卷二·暗流涌动 (Ch 31-80) ===
SC['v2_intro']={c:'case_v2',cn:'卷二·暗流涌动',t:'卷首：暗流',s:'建兴六年春 · 阒都',tx:'<p>卷一诸事已毕，阒都表面平静，实则暗流汹涌。</p><p><span class="gld">萧驰野</span>领巡防营后频繁出入昭罪寺，名为"巡查"实为私访。每次来带一壶酒，和沈泽川在院中对饮。两人话不多，但目光交汇之处，已是无声的默契。</p><p><span class="gld">沈泽川</span>在纪纲和齐太傅的教导下飞速成长。拳法日益精进，《帝策》《权经》烂熟于心。他开始通过齐太傅的关系网暗中联络朝中旧部。</p><p><span class="hi">花思谦察觉到了威胁。</span>他密会太后："沈家那小子在昭罪寺不是等死，是在备战。不可再留。"</p><p>太后冷笑："那就让他在春闱上出个意外。"</p><p><span class="cf">📌 卷二序幕</span></p>',cl:[],ch:[{t:'调查春闱之变的阴谋',nx:'v2_spring',n:''},{t:'查看萧沈二人的私下交往记录',nx:'v2_alliance',n:''}]};
SC['v2_spring']={c:'case_v2',cn:'卷二·暗流涌动',t:'春闱之变',s:'建兴六年三月 · 阒都会试院',tx:'<p>建兴六年春闱，花思谦精心布置了一场陷阱。</p><p>他在会试试卷中埋下"悖逆之言"，欲栽赃沈泽川"以罪臣之子身份蛊惑士子"。一旦坐实，沈泽川必死无疑——即使咸德帝想保也保不住。</p><p>但<span class="gld">齐太傅</span>提前获知了消息。这位被囚二十年的老太傅，通过旧日关系网截获了花思谦和主考官的密信。</p><p>"<span class="hi">他想用文字狱杀你</span>，"齐太傅说，"那我们就将计就计。"</p><p>沈泽川连夜写了一篇策论，托萧驰野暗中递到了咸德帝手中。策论中不仅揭穿了花思谦的阴谋，更提出了一套完整的边关军政改革方案——直击太后一党最不愿触碰的话题。</p><p>咸德帝看过策论后沉默良久。次日早朝，他突然下旨：<span class="hi">"会试延后，着巡防营萧驰野彻查考官徇私一案。"</span></p><p>花思谦面色铁青。太后在帘后捏碎了手中的佛珠。</p><p><span class="cf">📌 春闱之变</span></p>',cl:['c_empress_dowager','c_hua_faction'],ch:[{t:'继续查阅萧沈联手细节',nx:'v2_alliance',n:''},{t:'查看太后密诏',nx:'v2_decree',n:''}]};
SC['v2_alliance']={c:'case_v2',cn:'卷二·暗流涌动',t:'萧沈联手 · 夜谈',s:'昭罪寺 · 深夜',tx:'<p>春闱之事后，萧驰野来得更勤了。</p><p>这一夜他带了两壶酒，沈泽川收拳接过了其中一壶。两人坐在冰冷的石阶上，月光把影子拖得很长。</p><p>"花思谦不会善罢甘休，"萧驰野说，"这次他动的是文，下次可能就是刀兵。"</p><p>"那就让他来，"沈泽川说，眼神平静，"我在这昭罪寺里没什么能失去的。"</p><p>萧驰野转头看他。月色下，沈泽川的侧脸苍白但坚毅。他突然想起在茶石关第一次听到"沈泽川"这个名字时的感觉——一个被命运踩进泥里的少年，却始终没有折断。</p><p>"你有的，"萧驰野低声说，"我。"</p><p>沈泽川握酒壶的手微微一顿。</p><p>萧驰野没有看他的反应，只是盯着月亮："<span class="hi">离北需要盟友，我需要你在朝堂上。但我不只是为了离北。</span>"</p><p>他没有说完。沈泽川也没有追问。</p><p>但他们都知道，从今晚起，一切都不一样了。</p><p><span class="cf">📌 萧沈联手</span></p>',cl:['c_libei_pressure'],ch:[{t:'查看太后密诏',nx:'v2_decree',n:''},{t:'【卷二完结】前往离北狼烟',nx:'v2_end',n:'卷二结',cc:'case_v2'}]};
SC['v2_decree']={c:'case_v2',cn:'卷二·暗流涌动',t:'太后密诏',s:'慈宁宫 · 秘室',tx:'<p>暗阁截获太后发给花思谦的密诏：</p><p style="padding:12px;background:rgba(139,37,0,0.06);border:1px dashed var(--red);color:var(--red);letter-spacing:2px;">"沈泽川不可留。春闱事败，改以兵变。着花思谦联络禁军右统领韩氏，伺机在巡防营换防之日发动。事成之后，推罪于离北军，一石二鸟。"</p><p>太后不仅要杀沈泽川，还要借机铲除萧驰野和离北势力。</p><p><span class="gld">纪纲</span>看过密诏后默默起身，从床底抽出一把锈迹斑斑的刀。那是沈卫当年赠他的佩刀。</p><p>"二十年了，"纪纲的声音沙哑，"终于等到这一天。"</p><p><span class="cf">📌 太后密诏</span></p>',cl:['c_empress_dowager','c_hua_faction'],ch:[{t:'查阅萧沈联手的细节',nx:'v2_alliance',n:''},{t:'【卷二完结】前往离北狼烟',nx:'v2_end',n:'卷二结',cc:'case_v2'}]};
SC['v2_end']={c:'case_v2',cn:'卷终',t:'卷二·暗流涌动 · 完结',s:'建兴六年夏 · 阒都',tx:'<p>禁军兵变最终被萧驰野的巡防营提前察觉并镇压。韩氏被捕，花思谦再次受挫。齐太傅的帝王之术第一次在实战中证明了威力。</p><p>但更大的风暴正在酝酿。边沙十二部趁大周内斗之机，再次集结大军压境茶石关。离北告急。</p><p>萧驰野接到军令：北上迎敌。临行前夜，他又来了一次昭罪寺。</p><p>这次没有酒。他只是站在院中，看着沈泽川说："等我回来。"</p><p>沈泽川没有说"好"，也没有说"不"。他只是像往常一样摆出了拳架。</p><p>萧驰野笑了。然后转身消失在夜色中。</p><p style="text-align:center;font-size:14px;letter-spacing:3px;color:var(--red);margin:10px 0;">—— 卷二完 · 全书第80章 ——</p>',ch:[{t:'【进入卷三】离北狼烟 · 鸿江血战',nx:'v3_intro',n:'卷三开始'}]};

// === VOLUME 3: 卷三·离北狼烟 (Ch 81-150) ===
SC['v3_intro']={c:'case_v3',cn:'卷三·离北狼烟',t:'卷首：北上',s:'建兴六年秋 · 北上途中',tx:'<p>萧驰野率三万离北铁骑北上。大军出阒都时，沿街百姓跪了一地——他们知道，这些人去打的是一场胜算不高的仗。</p><p>边沙十二部这次集结了八万骑兵，由蒙驼部和悍蛇部联合统领。茶石关前已经丢了三个前哨营地。</p><p>"<span class="hi">三万对八万，"</span>陆广白在军帐里说，"不能硬拼。得用鸿江。"</p><p>鸿江是天然屏障。如果能诱敌深入，在江畔设伏，以少胜多未必不可能。</p><p>但诱敌的人选——需要一支能打能退、不退即死的部队。</p><p>萧驰野说："我来。"</p><p><span class="cf">📌 北上抗敌</span></p>',cl:['c_libei_pressure'],ch:[{t:'亲历鸿江血战',nx:'v3_battle',n:''},{t:'查看沈泽川的援军奇谋',nx:'v3_scheme',n:''}]};
SC['v3_battle']={c:'case_v3',cn:'卷三·离北狼烟',t:'鸿江血战',s:'建兴六年九月 · 鸿江北岸',tx:'<p>九月十五，鸿江北岸。秋风如刀。</p><p>萧驰野亲率前锋五千人诱敌。边沙骑兵见"离北二公子"亲自上阵，大喜过望——这是击杀狼王之子的大好机会。</p><p>八万骑兵追着五千人一路南下，直抵鸿江。</p><p>就在边沙大军渡江过半之时，两岸突然火起。陆广白和<span class="gld">萧既明</span>分别率伏兵从东西两侧杀出。鸿江上漂满了燃烧的木筏，把渡口封死。</p><p>萧驰野调转马头，抽刀高呼："<span class="hi">离北！</span>"</p><p>五千前锋齐声回应："<span class="hi">杀！</span>"</p><p>血战从午后打到黄昏。鸿江的水被染成了暗红色。边沙八万大军被截成两半，首尾不能相顾。</p><p>但萧既明在冲锋中中了三箭，重伤昏迷。陆广白的左臂被砍断。</p><p>离北赢了这场仗。代价是惨重的。</p><p><span class="cf">📌 鸿江血战</span></p>',cl:['c_libei_pressure','c_xiao_arrives'],ch:[{t:'查看沈泽川在阒都的援军奇谋',nx:'v3_scheme',n:''},{t:'【卷三完结】大捷班师',nx:'v3_triumph',n:''}]};
SC['v3_scheme']={c:'case_v3',cn:'卷三·离北狼烟',t:'援军奇谋',s:'阒都 · 暗阁',tx:'<p>当萧驰野在鸿江浴血时，沈泽川在阒都也在打一场仗。</p><p>花思谦在朝堂上阻挠援军调动，以"国库空虚"为由拒绝给离北增兵增粮。太后在幕后操纵户部和兵部，要让离北军弹尽粮绝。</p><p><span class="gld">齐太傅</span>冷笑："二十年了，她还在用同样的手段——断人粮草，等人饿死。"</p><p>沈泽川说："这次不会。"</p><p>他用齐太傅的关系网发动了一场"<span class="hi">文官起义</span>"——数十名被齐太傅教过的旧太子党官员联名上书，弹劾花思谦"阻挠军务、通敌卖国"。同时，纪纲暗中联络离北旧部，在户部大门口"请愿"三日。</p><p>咸德帝终于找到了摆脱太后控制的机会。他当着满朝文武的面批复："<span class="hi">离北军饷由内库直拨，绕过户部。着即日调拨援军两万北上。阻挠者以通敌论处。</span>"</p><p>花思谦跌坐在朝堂上，面如死灰。</p><p>这不是援军——这是咸德帝借沈泽川之力，对太后一党发动的第一次正面反击。</p><p><span class="cf">📌 援军奇谋</span></p>',cl:['c_empress_dowager','c_hua_faction'],ch:[{t:'观看大捷班师',nx:'v3_triumph',n:''}]};
SC['v3_triumph']={c:'case_v3',cn:'卷三·离北狼烟',t:'大捷班师',s:'建兴六年十一月 · 阒都城门',tx:'<p>十一月，萧驰野率军班师。阒都百姓倾城而出，迎接离北铁骑。</p><p>萧驰野骑在马上，黑甲上还带着刀痕和干涸的血迹。他的目光在人群中搜索——然后看到了站在城门一侧的沈泽川。</p><p>两人隔着人海对视。沈泽川微微点了点头。</p><p>萧驰野嘴角扬起——这是几个月来他第一次真正笑出来。</p><p>"<span class="hi">你做到了，"</span>他策马经过时低声说。</p><p>"你也是，"沈泽川回应。</p><p>大军入城。阒都的百姓欢呼。但暗阁知道——这只是暴风雨前的宁静。</p><p>太后和花思谦不会坐以待毙。更大的风暴，正在酝酿。</p><p style="text-align:center;font-size:14px;letter-spacing:3px;color:var(--red);margin:10px 0;">—— 卷三完 · 全书第150章 ——</p>',ch:[{t:'【进入卷四】天下归一 · 阒都政变',nx:'v4_intro',n:'卷四开始'}]};

// === VOLUME 4: 卷四·天下归一 (Ch 151-282) ===
SC['v4_intro']={c:'case_v4',cn:'卷四·天下归一',t:'卷首：风暴',s:'建兴七年正月 · 阒都',tx:'<p>建兴七年正月，阒都上空乌云密布。</p><p>太后花氏终于决定孤注一掷。离北军虽然大胜但元气大伤，咸德帝虽然硬气了一回但根基不稳。这是她最后的机会。</p><p>正月十五，元宵灯会之夜。太后暗中调集死士和忠于花党的禁军残部，从皇宫密道杀入太和殿，软禁了咸德帝。</p><p>同时，花思谦率人包围了昭罪寺——他要亲手解决沈泽川。</p><p>但他不知道，<span class="hi">齐太傅二十年前就已经预料到了这一天。</span></p><p><span class="cf">📌 阒都政变</span></p>',cl:['c_empress_dowager','c_hua_faction'],ch:[{t:'亲历阒都政变',nx:'v4_coup',n:''},{t:'查看沈卫冤案真相',nx:'v4_justice',n:''}]};
SC['v4_coup']={c:'case_v4',cn:'卷四·天下归一',t:'阒都政变 · 决战',s:'建兴七年正月十五 · 阒都',tx:'<p>花思谦带人闯入昭罪寺时，寺里空无一人。</p><p>齐太傅和纪纲早已通过密道将沈泽川转移到了萧驰野的巡防营。这是齐太傅最后的布局——<span class="hi">"置之死地而后生"</span>。</p><p>萧驰野率巡防营和离北残部反攻皇宫。沈泽川让纪纲联络旧部从外围包抄。陆广白虽然断了一臂，仍亲率50精骑杀入太和殿。</p><p>巷战持续了一整夜。阒都的火光照亮了半个天空。</p><p>黎明时分，花思谦在太和殿前被萧驰野一刀斩于阶下。太后被从密室中押出，面如死灰。</p><p>咸德帝被救出时，浑身颤抖却依然站着。他看着沈泽川和萧驰野并肩站在血染的太和殿中，缓缓说了一句：</p><p>"<span class="hi">朕……谢你们。</span>"</p><p><span class="cf">📌 花党覆灭 · 太后倒台</span></p>',cl:['c_court_beat','c_empress_dowager'],ch:[{t:'查看沈卫冤案的真相',nx:'v4_justice',n:''}]};
SC['v4_justice']={c:'case_v4',cn:'卷四·天下归一',t:'沈卫翻案',s:'太和殿 · 大朝会',tx:'<p>花党覆灭后，咸德帝终于得以亲政。第一项诏令就是重审沈卫通敌案。</p><p>尘封的证据被重新调出。暗阁的调查显示：沈卫从未通敌。当年的指控是<span class="hi">花思谦伪造的</span>——因为沈卫掌握了太后与边沙秘密交易的证据。</p><p>太后不是要惩处叛臣。太后是要灭口。</p><p>真相大白之日，沈泽川站在太和殿中，手里攥着父亲沈卫的遗物——一块碎裂的玉佩。那是纪暮在茶石关救他时交给他的。</p><p>咸德帝下旨："<span class="hi">沈卫冤案昭雪，追复建兴王爵位。其子沈泽川，忠勇可嘉，着即擢升为——</span>"</p><p>沈泽川打断了皇帝。他说："臣什么都不要。只求陛下给离北将士一个公道。"</p><p>萧驰野站在殿侧，嘴唇动了动，什么也没说。但他的手在袖中握紧了。</p><p><span class="cf">📌 沈卫翻案</span></p>',cl:['c_shenwei_treason','c_chashi_fall'],ch:[{t:'走向终局',nx:'v4_final',n:''}]};
SC['v4_final']={c:'case_v4',cn:'终卷',t:'江山定鼎',s:'全书终章 · 第282章',tx:'<p>花党覆灭。太后被囚冷宫。沈卫冤案昭雪。离北军得到追封和补给。</p><p>咸德帝终于成为真正的天子。他在齐太傅的建议下，重用贤臣，改革军政。大周迎来了久违的太平。</p><p>萧驰野本应回离北继任王位。但他上书说："离北有兄既明足矣。阒都有一个人，我不放心。"</p><p>咸德帝看了奏折后笑了。他批了四个字："准卿所请。"</p><p>沈泽川没有接受任何官职。他只是回到了昭罪寺——不是作为囚犯，而是作为守护者。他把齐太傅留下的典籍整理成册，开放给天下读书人。</p><p>纪纲依然在院里教拳。只是现在来学拳的不仅有沈泽川，还有阒都的孩子们。</p><p>某个黄昏，萧驰野翻墙进入昭罪寺的院子——就像他第一次来时那样。但这次他手里不是刀，而是一壶酒。</p><p>"贺兰山下，我买了座庄子，"他说，"后院有片空地，可以练拳。"</p><p>沈泽川放下手中的书卷，看着他。</p><p>"去不去？"萧驰野问。</p><p>沈泽川站起身，接过酒壶喝了一口。然后说了一个字：</p><p>"<span class="hi">走。</span>"</p><p style="text-align:center;font-size:18px;letter-spacing:6px;color:var(--gold);margin:18px 0;">🏮 全书完 · 282章 · 将进酒 🏮</p><p style="text-align:center;color:rgba(255,255,255,0.4);">沈泽川 × 萧驰野 · 暗阁谨识</p>',ch:[{t:'🏮 全书完结 · 重头再阅',nx:'case_chashi_intro',n:'',rst:true}]};

const CHARS=[{id:'shen',n:'沈泽川',ro:'建兴王第八子·待罪之人',info:'茶石关唯一活口。被押入昭罪寺后外表看似文弱，实则心性坚韧异常。白天随纪纲练拳习武，夜晚听齐太傅传授帝王之术与权谋之道。短短数月，从一个奄奄一息的阶下囚变为暗中积蓄力量的复仇者。他的心中藏着对父亲沈卫的复杂情感、对师兄纪暮的愧疚，以及一个尚未明确的野心。',fa:'待罪之人'},{id:'xiao',n:'萧驰野',ro:'离北王次子·骁骑将军',info:'离北铁骑的少年将军。不拘小节，善饮好斗，在沙场上所向披靡。但父王萧方旬的突然离世让他一夜之间扛起了离北的半壁江山。他南下阒都表面是为朝廷效力，实则在暗中寻找能够帮助离北突围的盟友。昭罪寺里那个瘦弱却倔强的少年，让他看到了某种可能性——也看到了某个让他无法移开视线的人。',fa:'离北军'},{id:'jigang',n:'纪纲',ro:'沈泽川之师·纪家拳传人',info:'原建兴王府武师，相貌被火烧毁，面目狰狞，但为人沉默寡言，忠义无双。独子纪暮在茶石关为救沈泽川而死。他将丧子之痛深埋心底，把全部的精力投入到培养沈泽川之中——这不仅是对沈卫旧恩的报答，更是对儿子遗志的延续。',fa:'昭罪寺'},{id:'qi',n:'齐惠连',ro:'前太子太傅·帝王之术传人',info:'曾是大周太子的老师，因太子被废受牵连，囚禁昭罪寺近二十年。漫长岁月中他将毕生所学锤炼为一套完整的帝王之术——包括《帝策》和《权经》。在沈泽川身上他看到了复仇的希望。他教沈泽川朝堂上每一个人的弱点，以及如何在这场权力游戏中生存并取胜。',fa:'昭罪寺'},{id:'huasiqian',n:'花思谦',ro:'太后心腹·内阁辅臣',info:'太后花氏最信任的朝臣，朝中党羽众多。表面儒雅恭谨，实则城府极深。多次在朝堂上欲置沈泽川于死地，但并非单纯为了讨好太后——他深知沈家案背后牵涉的秘密可能动摇花党根基。',fa:'花党'},{id:'empress',n:'太后花氏',ro:'咸德帝生母·后宫之主',info:'实际掌控大周朝政的女人。对沈家充满不可调和的敌意，表面是为国除害，实则是为了掩盖一桩陈年旧事——沈卫手中曾握有她不可告人的秘密。沈泽川的存在是她最大的威胁。',fa:'花党'},{id:'lugb',n:'陆广白',ro:'离北边关大将',info:'离北军中重臣，性格沉稳刚毅。宫宴上挺身而出为沈泽川求情，代表的不是个人立场而是整个离北军方的态度。他的发言让花思谦一时语塞，也让朝堂看到了离北铁骑的分量。',fa:'离北军'},{id:'emperor',n:'咸德帝',ro:'大周天子',info:'名义上的天下之主，实则处处受太后掣肘。在沈泽川一案上态度暧昧——既不欲杀一个少年背负骂名，又不敢公然违逆太后。他真正的心思藏得很深。',fa:'皇室'},{id:'xiaoji',n:'萧既明',ro:'离北王长子',info:'萧驰野的兄长，离北实际的主事者。相比弟弟的张扬不羁，他更加稳重内敛，是离北真正的大脑。父王逝后一手支撑离北军政大局，默默为萧驰野的每一次行动创造条件。',fa:'离北军'}];

// ============ CORE FUNCTIONS ============
function startGame(cont){
  if(cont){if(!loadState())resetState();}else resetState();
  document.getElementById('cover').classList.add('out');
  setTimeout(()=>{
    document.getElementById('cover').style.display='none';
    g('exitb').style.display='block';g('rptg').style.display='flex';
    renderAll();switchTab('dossier');
  },600);
}
function backToCover(){saveState();g('cover').style.display='flex';g('cover').classList.remove('out');g('exitb').style.display='none';g('rptg').style.display='none';closeRP();g('cont-btn').style.display=localStorage.getItem(KEY)?'block':'none';}
function resetConfirm(){if(confirm('确定要清除所有存档重新开始吗？')){resetState();startGame(false);}}
function resetState(){Object.assign(S,{ac:'case_chashi',cs:'case_chashi_intro',aff:20,scr:0,cf:[],dm:[],dm2:{},ru:[],vs:[],cc:[]});saveState();}
function g(id){return document.getElementById(id);}

// ============ RENDER ALL ============
function renderAll(){renderCaseBar();renderSceneFilter();renderDossier();updateTopBar();updateBottomBar();}
function renderCaseBar(){
  g('casebar').innerHTML=CASES.map(c=>{
    const a=S.ac===c.id,d=S.cc.includes(c.id);
    return `<button class="csb${a?' on':''}${d&&!a?' done':''}" onclick="selCase('${c.id}')">${c.e} ${c.n}</button>`;
  }).join('');
}
function renderSceneFilter(){
  const sel=g('sfilter'),sc=SSEQ[S.ac]||[];
  sel.innerHTML='<option value="">— 选择章节 —</option>'+sc.map(s=>{
    const v=S.vs.includes(s)||s===S.cs;
    return `<option value="${s}"${S.cs===s?' selected':''}${v?'':' disabled'}>${v?'📖':'🔒'} ${SLAB[s]||s}</option>`;
  }).join('');
}
function selCase(cid){S.ac=cid;const sc=SSEQ[cid]||[];if(sc.length>0){S.cs=sc[0];S.vs=[...new Set([...S.vs,S.cs])];}saveState();renderAll();switchTab('dossier');}
function jumpScene(sid){if(!sid)return;S.cs=sid;S.ac=SC[sid]?.c||S.ac;S.vs=[...new Set([...S.vs,sid])];saveState();renderAll();switchTab('dossier');}

function switchTab(name){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  const tb=document.querySelector(`[data-tab="${name}"]`);if(tb)tb.classList.add('on');
  document.querySelectorAll('.pnl').forEach(p=>p.classList.remove('on'));
  const pnl=g('pnl-'+name);if(pnl)pnl.classList.add('on');
  if(name==='map'){setTimeout(()=>{const f=g('map-iframe');if(f){f.style.height=(window.innerWidth<500?'320px':'580px');const w=f.contentWindow;if(w)w.addEventListener('mapRegionClick',(ev)=>{const rd=ev.detail;const map={mindou:'case_temple',zhongbo:'case_chashi',libei:'case_encounter',dongjiong:'case_encounter',gedale:'case_chashi',juexi:'case_chashi'};const cid=map[rd.region];if(cid){let h=`<div class="mt">📍 ${rd.data.name}</div><div class="ms">${rd.data.features?.replace(/<br>/g,' · ')}</div>`;if(rd.data.chars)h+=`<div class="ml">👤 人物</div><span class="mtag ch">${rd.data.chars}</span>`;if(rd.data.events)h+=`<div class="ml">⚡ 事件</div><span class="mtag ev">${rd.data.events}</span>`;h+=`<div class="ml">📜 关联</div><span class="mtag" onclick="selCase('${cid}');switchTab('dossier')">📜 前往案牍</span>`;g('minfo').innerHTML=h;g('minfo').classList.add('show');}})}},100);}
  if(name==='deduction')renderDeduction();
  if(name==='characters')renderChars();
  if(name==='decisions')renderDecs();
  if(name==='reports')renderRpts();
}

// ============ DOSSIER ============
function renderDossier(){
  const sc=SC[S.cs];if(!sc)return;const el=g('dossier-ctn');
  let h=`<div class="dcard">`;
  if(sc.cn)h+=`<div class="stamp">${sc.c==='case_ending'?'已封':'在查'}</div><div class="cid">暗阁 · ${sc.cn}</div>`;
  h+=`<h2>${sc.t}</h2>${sc.s?`<div class="cs">${sc.s}</div>`:''}<div class="nt">${sc.tx}</div>`;
  if(sc.ch&&sc.ch.length>0){h+=`<div class="cblock"><div class="clbl">▸ 办案操作</div>`;sc.ch.forEach((ch,i)=>{h+=`<button class="dbtn" onclick="doChoice(${i})">${ch.t}</button>`;});h+=`</div>`;}h+=`</div>`;
  // Show next case hint
  const nextCase=getNextCase(sc.c);
  if(nextCase&&!S.cc.includes(nextCase.id)){
    h+=`<div style="text-align:center;padding:12px;margin-top:8px;border:1px dashed rgba(184,147,85,0.2);border-radius:2px;font-size:11px;color:rgba(255,255,255,0.4);letter-spacing:1px;cursor:pointer" onclick="selCase('${nextCase.id}');switchTab('dossier')">📂 发现新案卷：<span style="color:var(--gold)">${nextCase.n}</span> — 点击查阅</div>`;
  }
  el.innerHTML=h;
  if(sc.cl)sc.cl.forEach(cid=>unlockC(cid));renderSceneFilter();
}
function getNextCase(cur){const idx=CASES.findIndex(c=>c.id===cur);if(idx>=0&&idx<CASES.length-1)return CASES[idx+1];return null;}
function doChoice(i){
  const sc=SC[S.cs];if(!sc||!sc.ch[i])return;const ch=sc.ch[i];
  if(ch.ad)S.aff=Math.max(0,Math.min(100,S.aff+ch.ad));S.scr+=10;
  if(ch.cc&&!S.cc.includes(ch.cc)){S.cc.push(ch.cc);RPTS.forEach(r=>{if(r.uc===ch.cc&&!S.ru.includes(r.id)){S.ru.push(r.id);toast('📨 新密函：'+r.ti);}});toast('✅ 案牍完结：'+sc.cn);}
  if(ch.rst){resetState();renderAll();switchTab('dossier');return;}
  if(ch.n)S.dm2[sc.c]=ch.n;
  S.vs=[...new Set([...S.vs,S.cs])];S.cs=ch.nx;
  if(SC[ch.nx])S.ac=SC[ch.nx].c;saveState();renderAll();switchTab('dossier');
}
function unlockC(cid){if(!S.cf.includes(cid)){S.cf.push(cid);S.scr+=5;saveState();}}

  function inkMt(cx,cy,w,h,op){for(let i=0;i<3;i++){const a=op*(0.35-i*0.1);if(a<=0)continue;const o=i*7;c.fillStyle=`rgba(80,60,40,${a})`;c.beginPath();c.moveTo(cx-w/2-o,cy+h/2);c.quadraticCurveTo(cx-w/4,cy-h*0.8-o*0.5,cx,cy-h*0.7-o*0.3);c.quadraticCurveTo(cx+w/4,cy-h*0.8-o*0.5,cx+w/2+o,cy+h/2);c.closePath();c.fill();}}
  mtn.forEach(m=>inkMt(m.x*W,m.y*H,m.w*W,m.h*H,0.55));

  inkRiv([[0.5,0.05],[0.52,0.15],[0.56,0.28],[0.58,0.38],[0.6,0.5],[0.62,0.62],[0.64,0.78],[0.62,0.94]],2,'rgba(80,120,150,0.5)');
  inkRiv([[0.2,0.3],[0.25,0.42],[0.3,0.55],[0.32,0.68],[0.34,0.85]],1.6,'rgba(80,120,150,0.35)');

function setupMapEvents(){

function getMapR(e){const cv=g('mapc'),r=cv.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;if(mx<0||my<0||mx>cv.width||my>cv.height)return null;for(const reg of MAPR){const rx=reg.x*cv.width,ry=reg.y*cv.height,rw=(reg.w||80)/2,rh=(reg.h||28)/2;if(mx>rx-rw-20&&mx<rx+rw+20&&my>ry-rh-30&&my<ry+rh+10)return reg;}return null;}
