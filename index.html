<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>将进酒 · 暗阁</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700;900&family=Ma+Shan+Zheng&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#100c0a;--paper:#f0e6d3;--red:#8b2500;--red-bright:#c0392b;--gold:#b8963c;--gold-light:#d4b96a;--ink:#2c1810;--text-mid:#5c4330;--border:#8b7355;--card-bg:#fff8ee;--shen:#6a8caf;--xiao:#b05a3a}
body{font-family:'Noto Serif SC',serif;background:var(--bg);background-image:radial-gradient(ellipse at 50% 10%,rgba(180,140,60,0.06) 0%,transparent 50%);color:var(--paper);min-height:100vh;overflow-x:hidden}
#bg-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
#app{position:relative;z-index:1;max-width:1000px;margin:0 auto;padding:0 20px;min-height:100vh;display:flex;flex-direction:column}

/* ==== COVER ==== */
#cover{position:fixed;top:0;left:0;width:100%;height:100%;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(ellipse at center,rgba(30,20,12,0.96) 0%,#0a0705 100%);transition:opacity 0.8s}
#cover.out{opacity:0;pointer-events:none}
#cover .seal-r{width:110px;height:110px;border:3px solid var(--red);display:flex;align-items:center;justify-content:center;transform:rotate(-5deg);margin-bottom:24px;animation:sa 1.2s ease-out;box-shadow:0 0 30px rgba(139,37,0,0.3)}
#cover .seal-r span{color:var(--red);font-size:13px;letter-spacing:3px;text-align:center;line-height:2;font-family:'Ma Shan Zheng',cursive}
@keyframes sa{0%{opacity:0;transform:rotate(-5deg) scale(0.5)}60%{transform:rotate(-5deg) scale(1.1)}100%{opacity:1;transform:rotate(-5deg) scale(1)}}
#cover .title-l{display:block;font-size:54px;font-weight:900;letter-spacing:12px;background:linear-gradient(180deg,#f0d890,#c9a96e,#8a6d3b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:tr 1.6s ease-out 0.4s both;text-shadow:0 0 40px rgba(201,169,110,0.3)}
@keyframes tr{0%{opacity:0;letter-spacing:50px;filter:blur(10px)}100%{opacity:1;letter-spacing:12px;filter:blur(0)}}
#cover .sub{font-size:13px;letter-spacing:6px;background:var(--paper);color:var(--ink);display:inline-block;padding:4px 16px;margin-top:12px;animation:fu 1s ease-out 0.8s both;border:1px solid rgba(139,55,0,0.2)}
#cover .dline{width:1px;height:50px;background:linear-gradient(180deg,transparent,var(--gold),transparent);margin:12px 0;animation:fu 1s ease-out 1s both}
#cover .btns{display:flex;flex-direction:column;align-items:center;gap:8px;animation:fu 1s ease-out 1.2s both}
#cover .cbtn{padding:12px 56px;font-size:17px;letter-spacing:6px;cursor:pointer;font-family:inherit;background:transparent;border:1px solid var(--gold);color:var(--gold);transition:all 0.4s}
#cover .cbtn:hover{background:rgba(201,169,110,0.12);box-shadow:0 0 30px rgba(201,169,110,0.2)}
#cover .cbtn.rst{padding:9px 40px;font-size:12px;letter-spacing:3px;border-color:rgba(201,169,110,0.2);color:rgba(201,169,110,0.35)}
#cover .cbtn.rst:hover{border-color:var(--red);color:var(--red-bright)}
#cover .inkd{position:absolute;pointer-events:none;opacity:0.02;font-size:300px;color:#fff;font-family:'Ma Shan Zheng',cursive}
#cover .inkd.t{top:-70px;left:50%;transform:translateX(-50%)}
#cover .inkd.b{bottom:-50px;right:3%}
@keyframes fu{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}

/* ==== HEADER ==== */
#hdr{text-align:center;padding:22px 0 8px;border-bottom:1px solid rgba(184,147,85,0.15);position:relative}
#hdr::after{content:'';position:absolute;bottom:-1px;left:30%;right:30%;height:1px;background:linear-gradient(90deg,transparent,rgba(184,147,85,0.4),transparent)}
#hdr .seal{display:inline-block;border:2px solid var(--red);color:var(--red);padding:5px 14px;font-size:12px;letter-spacing:3px;transform:rotate(-2deg);margin-bottom:5px;font-family:'Ma Shan Zheng',cursive;box-shadow:0 0 8px rgba(139,37,0,0.2)}
#hdr h1{font-size:28px;font-weight:900;letter-spacing:8px;background:linear-gradient(180deg,#e8d5a0,#b8963c,#7a5c20);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
#hdr .sub{font-size:11px;letter-spacing:4px;background:var(--paper);color:var(--ink);display:inline-block;padding:2px 10px;margin-top:2px;border:1px solid rgba(139,55,0,0.12)}

/* ==== POV SWITCH ==== */
#povbar{display:flex;justify-content:center;align-items:center;gap:0;margin:10px 0 4px}
#povsw{display:inline-flex;border:1px solid rgba(184,147,85,0.3);border-radius:20px;overflow:hidden;background:rgba(0,0,0,0.25)}
#povsw button{padding:6px 20px;font-size:12px;letter-spacing:2px;cursor:pointer;font-family:inherit;background:transparent;border:none;color:rgba(255,255,255,0.4);transition:all 0.35s;position:relative}
#povsw button .pv-ttl{font-weight:700}
#povsw button .pv-sub{font-size:8px;letter-spacing:1px;display:block;opacity:0.7}
#povsw button[data-pov="shen"].on{background:linear-gradient(135deg,rgba(106,140,175,0.35),rgba(106,140,175,0.15));color:#bcd4ea;box-shadow:inset 0 0 12px rgba(106,140,175,0.2)}
#povsw button[data-pov="xiao"].on{background:linear-gradient(135deg,rgba(176,90,58,0.35),rgba(176,90,58,0.15));color:#f0c0a8;box-shadow:inset 0 0 12px rgba(176,90,58,0.2)}
#povsw .pvdiv{width:1px;background:rgba(184,147,85,0.2)}

/* ==== NAV ==== */
#toprow{display:flex;justify-content:space-between;align-items:center;padding:8px 0;font-size:11px;color:rgba(255,255,255,0.4);flex-wrap:wrap;gap:6px}
#toprow span{color:var(--gold);font-weight:600;font-size:12px}
#casebar{display:flex;align-items:center;gap:5px;padding:4px 0;flex-wrap:wrap}
#casebar .csb{padding:4px 9px;font-size:10px;letter-spacing:1px;background:rgba(255,255,255,0.03);border:1px solid rgba(184,147,85,0.12);color:rgba(255,255,255,0.4);cursor:pointer;font-family:inherit;transition:all 0.3s;border-radius:2px}
#casebar .csb:hover{border-color:var(--gold);color:var(--gold-light)}
#casebar .csb.on{border-color:var(--red);color:var(--gold);background:rgba(139,37,0,0.08)}
#casebar .csb.done{border-color:var(--gold);color:var(--gold)}
#casebar .csb.done::after{content:' ✓';font-size:8px;color:#5cb85c}
#sfwrap{padding:2px 0 8px}
#sfwrap select{padding:4px 8px;font-size:11px;background:rgba(0,0,0,0.3);border:1px solid rgba(184,147,85,0.15);color:var(--paper);font-family:inherit;min-width:160px;border-radius:2px;outline:none}

/* ==== TABS ==== */
#tabs{display:flex;border-bottom:1px solid rgba(184,147,85,0.1);align-items:center;flex-wrap:wrap}
.tab{padding:8px 14px;cursor:pointer;font-size:12px;letter-spacing:1px;color:rgba(255,255,255,0.3);border-bottom:2px solid transparent;transition:all 0.3s;background:transparent;border-top:none;border-left:none;border-right:none;font-family:inherit}
.tab:hover{color:var(--gold-light)}
.tab.on{color:var(--gold);border-bottom-color:var(--red)}
.tab.mtab{margin-left:auto;color:rgba(216,180,120,0.5);font-weight:600}
.tab.mtab.on{color:var(--gold-light);border-bottom-color:var(--gold)}

/* ==== CONTENT ==== */
#ctn{flex:1;padding:10px 0}
.pnl{display:none;animation:fi 0.35s ease}.pnl.on{display:block}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Dossier */
#pov-note{font-size:11px;letter-spacing:1px;padding:8px 12px;margin-bottom:10px;border-radius:3px;border-left:3px solid;line-height:1.7}
#pov-note.shen{background:rgba(106,140,175,0.08);border-color:var(--shen);color:#bcd4ea}
#pov-note.xiao{background:rgba(176,90,58,0.08);border-color:var(--xiao);color:#f0c0a8}
.dcard{background:linear-gradient(135deg,var(--card-bg),#f5ead5);border:1px solid var(--border);border-radius:4px;padding:24px 26px;margin-bottom:14px;color:var(--ink);box-shadow:0 3px 18px rgba(0,0,0,0.3);position:relative}
.dcard::before{content:'';position:absolute;top:6px;left:6px;right:6px;bottom:6px;border:1px solid rgba(139,37,0,0.05);pointer-events:none}
.dcard .stamp{position:absolute;top:14px;right:14px;border:2px solid var(--red);color:var(--red);padding:3px 8px;font-size:10px;letter-spacing:2px;transform:rotate(8deg);opacity:0.5;font-family:'Ma Shan Zheng',cursive}
.dcard .cid{font-size:10px;color:var(--text-mid);letter-spacing:2px;border-bottom:1px dashed var(--border);padding-bottom:5px;margin-bottom:10px}
.dcard h2{font-size:18px;font-weight:700;letter-spacing:2px;margin-bottom:2px}
.dcard .cs{font-size:11px;color:var(--red);margin-bottom:10px}
.dcard .nt{line-height:2.1;font-size:13px;text-align:justify}
.dcard .nt p{margin-bottom:12px;text-indent:2em}
.dcard .nt .hi{color:var(--red-bright);font-weight:600}
.dcard .nt .gld{color:#8b6914;font-weight:600}
.dcard .nt .cf{display:inline-block;background:rgba(139,37,0,0.05);border:1px dashed var(--red);padding:2px 6px;margin:2px 3px;font-size:11px;color:var(--red);letter-spacing:1px}
.cblock{margin-top:14px;padding-top:10px;border-top:1px dashed var(--border)}
.cblock .clbl{font-size:10px;color:var(--text-mid);letter-spacing:2px;margin-bottom:6px}
.dbtn{display:block;width:100%;padding:9px 14px;margin-bottom:4px;background:rgba(184,147,85,0.04);border:1px solid var(--border);color:var(--ink);text-align:left;font-family:inherit;font-size:12px;cursor:pointer;letter-spacing:1px;transition:all 0.3s;border-radius:2px}
.dbtn:hover{background:rgba(184,147,85,0.12);border-color:var(--gold);padding-left:18px}
.dbtn::before{content:'▸ ';color:var(--red);font-size:9px}
.dbtn .rw{float:right;font-size:9px;color:#8b6914;letter-spacing:0}
.dbtn.locked{opacity:0.4;cursor:not-allowed}
.dbtn.locked:hover{padding-left:14px;background:rgba(184,147,85,0.04);border-color:var(--border)}
.dbtn.locked .rw{color:var(--red)}

/* Map */
#mc{position:relative;width:100%;border:1px solid rgba(139,100,60,0.25);border-radius:4px;overflow:hidden;background:#e8dcc8}
#mapc{display:block;width:100%}
#mtt{position:absolute;pointer-events:none;background:rgba(20,15,10,0.96);border:1px solid var(--gold);padding:6px 10px;font-size:10px;color:var(--gold);letter-spacing:1px;border-radius:2px;display:none;z-index:10;white-space:nowrap}
#minfo{background:rgba(0,0,0,0.15);border:1px solid rgba(184,147,85,0.15);border-radius:4px;padding:16px;margin-top:8px;display:none}
#minfo.show{display:block;animation:fi 0.4s ease}
#minfo .mt{font-size:14px;color:var(--gold);letter-spacing:2px;margin-bottom:2px}
#minfo .ms{font-size:10px;color:rgba(255,255,255,0.25);letter-spacing:1px;margin-bottom:8px}
#minfo .ml{font-size:9px;color:rgba(255,255,255,0.2);margin-bottom:3px}
#minfo .mtag{display:inline-block;padding:2px 8px;margin:2px;background:rgba(184,147,85,0.08);border:1px solid rgba(184,147,85,0.18);color:var(--paper);font-size:10px;letter-spacing:1px;border-radius:2px;cursor:pointer;transition:all 0.3s}
#minfo .mtag:hover{background:rgba(184,147,85,0.16);border-color:var(--gold);color:var(--gold)}
#minfo .mtag.ch{background:rgba(139,37,0,0.06);border-color:rgba(139,37,0,0.2)}
#minfo .mtag.ev{background:rgba(46,139,87,0.04);border-color:rgba(46,139,87,0.18)}

/* Deduction */
.ded-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:6px;margin-bottom:16px}
.clue-c{background:rgba(255,255,255,0.02);border:1px solid rgba(184,147,85,0.1);padding:9px 6px;cursor:pointer;transition:all 0.3s;border-radius:2px;text-align:center;font-size:11px;letter-spacing:1px;min-height:36px;display:flex;align-items:center;justify-content:center}
.clue-c:hover{border-color:var(--gold);background:rgba(184,147,85,0.04)}
.clue-c.sel{border-color:var(--red)!important;background:rgba(139,37,0,0.08)!important;box-shadow:0 0 10px rgba(139,37,0,0.15)}
.clue-c.found{color:var(--paper)}.clue-c.lock{opacity:0.25;cursor:not-allowed;color:rgba(255,255,255,0.1)}
.ded-res{background:rgba(184,147,85,0.04);border:1px solid var(--gold);padding:14px;margin-top:10px;border-radius:2px;display:none;color:var(--paper);line-height:1.9;font-size:13px}
.ded-res.show{display:block}

/* Characters */
.ch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:8px}
.ch-card{background:rgba(255,255,255,0.02);border:1px solid rgba(184,147,85,0.1);padding:14px;border-radius:2px;transition:all 0.3s;cursor:pointer}
.ch-card:hover{border-color:var(--gold);background:rgba(184,147,85,0.04)}
.ch-card h4{font-size:14px;color:var(--gold-light);letter-spacing:1px;margin-bottom:2px}
.ch-card .role{font-size:10px;color:rgba(255,255,255,0.3);margin-bottom:6px}
.ch-card .info{font-size:10px;color:rgba(255,255,255,0.4);line-height:1.7}

/* Decisions */
.dec-card{background:linear-gradient(135deg,rgba(139,37,0,0.04),rgba(0,0,0,0.1));border:1px solid rgba(139,37,0,0.2);padding:16px;margin-bottom:10px;border-radius:2px}
.dec-card .dc{font-size:10px;color:var(--red);margin-bottom:3px}
.dec-card .dq{font-size:13px;color:var(--paper);line-height:1.7}

/* Reports */
.rpt-card{background:rgba(255,255,255,0.01);border:1px solid rgba(184,147,85,0.08);padding:14px;margin-bottom:8px;border-radius:2px;transition:all 0.3s;cursor:pointer}
.rpt-card:hover{border-color:rgba(184,147,85,0.25)}
.rpt-card.lk{opacity:0.3;cursor:not-allowed}
.rpt-card .rf{font-size:9px;color:var(--text-mid);margin-bottom:2px}
.rpt-card .rt{font-size:12px;color:var(--gold-light)}
.rpt-card .rp{font-size:10px;color:rgba(255,255,255,0.25);margin-top:3px}

/* ==== CULTIVATION (attributes) ==== */
#pnl-cultivation .cult-head{display:flex;align-items:center;gap:14px;padding:14px;border:1px solid rgba(184,147,85,0.15);border-radius:4px;margin-bottom:14px;background:linear-gradient(135deg,rgba(0,0,0,0.2),rgba(184,147,85,0.03))}
.cult-avatar{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;font-family:'Ma Shan Zheng',cursive;flex-shrink:0;border:2px solid}
.cult-avatar.shen{background:rgba(106,140,175,0.15);border-color:var(--shen);color:#bcd4ea}
.cult-avatar.xiao{background:rgba(176,90,58,0.15);border-color:var(--xiao);color:#f0c0a8}
.cult-head .ci h3{font-size:17px;color:var(--gold-light);letter-spacing:2px}
.cult-head .ci .cr{font-size:11px;color:rgba(255,255,255,0.4);margin:2px 0}
.cult-head .ci .cl{font-size:11px;color:var(--gold)}
.cult-head .ci .cl b{font-size:14px}
.attr-row{margin-bottom:12px}
.attr-row .al{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;color:var(--paper)}
.attr-row .al .an{letter-spacing:2px}
.attr-row .al .av{color:var(--gold);font-weight:600}
.attr-bar{height:9px;background:rgba(255,255,255,0.05);border-radius:5px;overflow:hidden;border:1px solid rgba(184,147,85,0.1)}
.attr-bar .af{height:100%;border-radius:5px;transition:width 0.7s cubic-bezier(0.22,0.61,0.36,1)}
.attr-bar.shen .af{background:linear-gradient(90deg,#4a6a8f,#8fb4d8)}
.attr-bar.xiao .af{background:linear-gradient(90deg,#8f3a1a,#d88a6a)}
.attr-desc{font-size:10px;color:rgba(255,255,255,0.3);margin-top:3px;line-height:1.6}
.cult-tip{font-size:11px;color:rgba(255,255,255,0.35);line-height:1.9;padding:12px;border:1px dashed rgba(184,147,85,0.2);border-radius:3px;margin-top:8px}

/* ==== CONTACTS ==== */
.ct-list{display:flex;flex-direction:column;gap:2px}
.ct-item{display:flex;align-items:center;gap:12px;padding:12px 10px;border-bottom:1px solid rgba(255,255,255,0.04);cursor:pointer;transition:all 0.25s;border-radius:4px}
.ct-item:hover{background:rgba(184,147,85,0.05)}
.ct-av{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:19px;font-family:'Ma Shan Zheng',cursive;flex-shrink:0;border:1.5px solid rgba(184,147,85,0.3);background:rgba(184,147,85,0.08);color:var(--gold-light)}
.ct-item .cc{flex:1;min-width:0}
.ct-item .cn{font-size:14px;color:var(--gold-light);letter-spacing:1px}
.ct-item .cr{font-size:10px;color:rgba(255,255,255,0.3)}
.ct-item .cl{font-size:10px;color:rgba(255,255,255,0.25);margin-top:2px}
.ct-item .cbadge{font-size:9px;color:#5cb85c;border:1px solid rgba(92,184,92,0.3);padding:1px 6px;border-radius:8px}
.ct-empty{text-align:center;color:rgba(255,255,255,0.2);padding:30px;font-size:12px;line-height:2}
.ct-item{position:relative}
.ct-item .ct-time{position:absolute;top:12px;right:6px;font-size:10px;color:rgba(255,255,255,0.25)}
.ct-item .cl{margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:180px}

/* ==== RIGHT PANEL POV SWITCH ==== */
#rp-povsw{display:none;gap:0;margin-bottom:12px;border:1px solid rgba(184,147,85,0.25);border-radius:22px;overflow:hidden;background:rgba(0,0,0,0.25)}
#rp-povsw button{flex:1;padding:8px 6px;font-family:inherit;background:transparent;border:none;color:rgba(255,255,255,0.4);cursor:pointer;transition:all 0.3s;text-align:center;line-height:1.3}
#rp-povsw button b{font-size:13px;letter-spacing:1px;display:block}
#rp-povsw button i{font-size:9px;font-style:normal;opacity:0.7}
#rp-povsw button[data-pov="shen"].on{background:linear-gradient(135deg,rgba(106,140,175,0.4),rgba(106,140,175,0.15));color:#bcd4ea}
#rp-povsw button[data-pov="xiao"].on{background:linear-gradient(135deg,rgba(176,90,58,0.4),rgba(176,90,58,0.15));color:#f0c0a8}

/* ==== RIGHT PANEL MENU (总目录) ==== */
.menu-case{padding:9px 10px;margin-top:8px;font-size:13px;color:var(--gold-light);letter-spacing:1px;border:1px solid rgba(184,147,85,0.15);border-radius:4px;cursor:pointer;transition:all 0.25s;background:rgba(184,147,85,0.03)}
.menu-case:hover{border-color:var(--gold);background:rgba(184,147,85,0.08)}
.menu-case.on{border-color:var(--red);color:var(--gold);background:rgba(139,37,0,0.1)}
.menu-chs{padding:2px 0 4px 8px}
.menu-ch{padding:6px 10px;font-size:11px;color:rgba(255,255,255,0.4);cursor:pointer;border-left:1px solid rgba(184,147,85,0.12);transition:all 0.2s}
.menu-ch:hover{color:var(--gold);border-color:var(--gold)}
.menu-ch.lk{opacity:0.35;cursor:not-allowed}
.menu-ch.lk:hover{color:rgba(255,255,255,0.4)}

/* ==== ATTRIBUTE POINTS ==== */
.cult-points{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--paper);padding:10px 12px;margin-bottom:12px;border:1px solid rgba(184,147,85,0.2);border-radius:4px;background:linear-gradient(135deg,rgba(184,147,85,0.08),transparent)}
.cult-points b{font-size:16px;color:var(--gold);font-weight:700}
.cult-points span{font-size:10px;color:rgba(255,255,255,0.35)}
.ptbtn{width:22px;height:22px;border-radius:50%;border:1px solid var(--gold);background:rgba(184,147,85,0.1);color:var(--gold);font-family:inherit;font-size:13px;cursor:pointer;line-height:1;margin-left:6px;transition:all 0.2s;vertical-align:middle}
.ptbtn:hover:not(:disabled){background:var(--gold);color:#1a1208}
.ptbtn:disabled{opacity:0.25;cursor:not-allowed}
.chat-inter{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;padding-bottom:8px}
.chat-inter .iract{padding:6px 12px;font-size:11px;font-family:inherit;background:rgba(176,90,58,0.08);border:1px solid rgba(184,147,85,0.2);color:var(--gold-light);border-radius:14px;cursor:pointer;transition:all 0.25s}
.chat-inter .iract:hover{background:rgba(184,147,85,0.15);border-color:var(--gold)}

/* chat */
#chatview{display:none}
#chatview.on{display:block}
.chat-head{display:flex;align-items:center;gap:10px;padding:8px 4px 12px;border-bottom:1px solid rgba(184,147,85,0.12);margin-bottom:10px}
.chat-head .cbk{background:none;border:none;color:var(--gold);font-family:inherit;font-size:12px;cursor:pointer;padding:4px 8px}
.chat-head .cbk:hover{color:var(--gold-light)}
.chat-head .ct-av{width:36px;height:36px;font-size:16px}
.chat-head .chn{font-size:14px;color:var(--gold-light);letter-spacing:1px}
.chat-head .chr{font-size:10px;color:rgba(255,255,255,0.3)}
.chat-log{min-height:120px;max-height:52vh;overflow-y:auto;padding:6px 4px;margin-bottom:10px}
.msg{display:flex;margin-bottom:12px;animation:fi 0.3s ease}
.msg.npc{justify-content:flex-start}
.msg.me{justify-content:flex-end}
.bubble{max-width:78%;padding:9px 13px;font-size:12.5px;line-height:1.8;border-radius:12px;letter-spacing:0.5px;position:relative}
.msg.npc .bubble{background:rgba(255,248,238,0.92);color:var(--ink);border-bottom-left-radius:3px}
.msg.me .bubble{background:linear-gradient(135deg,#2a4056,#1c2c3c);color:#dfeaf2;border-bottom-right-radius:3px;border:1px solid rgba(106,140,175,0.3)}
.pov-xiao .msg.me .bubble{background:linear-gradient(135deg,#4a2418,#3a1c12);color:#f0d8c8;border-color:rgba(176,90,58,0.3)}
.msg .who{font-size:9px;color:rgba(255,255,255,0.3);margin:0 6px;align-self:flex-end}
.chat-opts{display:flex;flex-direction:column;gap:6px;border-top:1px dashed rgba(184,147,85,0.15);padding-top:10px}
.chat-opts .copt{text-align:left;padding:10px 14px;font-size:12px;font-family:inherit;background:rgba(184,147,85,0.05);border:1px solid rgba(184,147,85,0.2);color:var(--paper);cursor:pointer;border-radius:8px;letter-spacing:0.5px;transition:all 0.25s;line-height:1.6}
.chat-opts .copt:hover{background:rgba(184,147,85,0.12);border-color:var(--gold)}
.chat-opts .copt .orw{float:right;font-size:9px;color:#8b6914;margin-left:8px}
.chat-opts .copt.locked{opacity:0.45;cursor:not-allowed}
.chat-opts .copt.locked:hover{background:rgba(184,147,85,0.05);border-color:rgba(184,147,85,0.2)}
.chat-opts .copt.locked .orw{color:var(--red)}
.chat-end{text-align:center;font-size:11px;color:rgba(255,255,255,0.3);padding:14px;letter-spacing:2px}
.chat-typing{font-size:11px;color:rgba(255,255,255,0.3);padding:4px 10px;letter-spacing:2px}

/* Bottom bar */
#bbar{display:flex;justify-content:space-between;padding:8px 0;border-top:1px solid rgba(184,147,85,0.08);font-size:10px;color:rgba(255,255,255,0.28);margin-top:12px;flex-wrap:wrap;gap:4px}
#bbar .bv{color:var(--gold);font-weight:600}

/* Toast */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--gold);padding:8px 16px;border:1px solid var(--gold);font-size:11px;letter-spacing:2px;z-index:200;animation:ti 0.4s ease,to 0.4s ease 2.2s forwards;border-radius:2px;pointer-events:none}
@keyframes ti{from{opacity:0;transform:translateX(-50%) translateY(-20px)}}@keyframes to{to{opacity:0;transform:translateX(-50%) translateY(-20px)}}

/* Modal */
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:300;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.3s}
.modal-overlay.show{opacity:1;pointer-events:all}
.modal-box{background:linear-gradient(135deg,#1a1512,#231d14);border:1px solid var(--gold);padding:28px;max-width:500px;width:90%;border-radius:4px;position:relative;box-shadow:0 8px 40px rgba(0,0,0,0.5)}
.modal-box .mclose{position:absolute;top:10px;right:14px;background:none;border:none;color:rgba(255,255,255,0.4);font-size:20px;cursor:pointer;font-family:inherit}
.modal-box .mclose:hover{color:var(--gold)}
.modal-box h3{font-size:18px;color:var(--gold-light);letter-spacing:3px;margin-bottom:4px}
.modal-box .mrole{font-size:11px;color:rgba(255,255,255,0.3);margin-bottom:12px}
.modal-box .minfo{font-size:13px;color:rgba(255,255,255,0.65);line-height:2.2;letter-spacing:1px}

/* Exit & Panel toggles */
#exitb{position:fixed;top:12px;left:16px;z-index:50;padding:4px 10px;font-size:10px;cursor:pointer;font-family:inherit;background:rgba(0,0,0,0.4);border:1px solid rgba(184,147,85,0.15);color:rgba(255,255,255,0.3);border-radius:2px;transition:all 0.3s;display:none}
#exitb:hover{background:rgba(139,37,0,0.2);border-color:var(--red);color:var(--red-bright)}
#rptg{position:fixed;top:12px;right:12px;z-index:50;display:none;gap:4px;flex-wrap:wrap;justify-content:flex-end;max-width:62vw}
#rptg button{padding:4px 9px;font-size:10px;cursor:pointer;font-family:inherit;background:rgba(0,0,0,0.55);border:1px solid rgba(184,147,85,0.15);color:rgba(255,255,255,0.35);border-radius:2px;transition:all 0.3s}
#rptg button:hover{background:rgba(184,147,85,0.1);border-color:var(--gold);color:var(--gold)}

/* Right Panel */
#rpanel{position:fixed;top:0;right:-400px;width:380px;height:100%;z-index:60;background:rgba(16,12,10,0.98);border-left:1px solid rgba(184,147,85,0.18);transition:right 0.4s ease;overflow-y:auto;padding:20px;box-shadow:-5px 0 30px rgba(0,0,0,0.5)}
#rpanel.open{right:0}
#rpanel .rpc{position:absolute;top:10px;right:14px;background:none;border:none;color:rgba(255,255,255,0.35);font-size:18px;cursor:pointer}
#rpanel .rpc:hover{color:var(--gold)}
#rpanel .rpt{font-size:14px;color:var(--gold);letter-spacing:2px;margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid rgba(184,147,85,0.1)}
#rpanel .rptabs{display:flex;margin-bottom:10px}
#rpanel .rtab{padding:5px 12px;font-size:10px;cursor:pointer;font-family:inherit;background:none;border:none;color:rgba(255,255,255,0.3);border-bottom:1px solid transparent;transition:all 0.3s}
#rpanel .rtab:hover{color:var(--gold)}
#rpanel .rtab.on{color:var(--gold);border-bottom-color:var(--red)}
#rpanel .rpcnt{display:none}#rpanel .rpcnt.on{display:block}

.rp-chi{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.03);cursor:pointer;transition:all 0.2s}
.rp-chi:hover{background:rgba(184,147,85,0.04)}
.rp-chi .nm{color:var(--gold-light);font-size:13px}
.rp-chi .rl{font-size:9px;color:rgba(255,255,255,0.28)}

.rp-tl{position:relative;padding-left:16px}
.rp-tl::before{content:'';position:absolute;left:3px;top:0;bottom:0;width:1px;background:rgba(184,147,85,0.15)}
.rp-tli{padding:4px 0 12px 12px;position:relative;font-size:11px;color:rgba(255,255,255,0.4)}
.rp-tli::before{content:'';position:absolute;left:-15px;top:8px;width:6px;height:6px;border-radius:50%;background:var(--gold)}
.rp-tli.done::before{background:#5cb85c}
.rp-tli .tl{color:var(--gold);font-weight:600;font-size:12px}
.rp-tli .ts{font-size:9px;color:rgba(255,255,255,0.2)}

.rp-rel{padding:6px 0;font-size:11px;color:rgba(255,255,255,0.5)}
.rp-rel .rleft{color:var(--gold-light)}
.rp-rel .redge{color:rgba(255,255,255,0.2);margin:0 6px}
.rp-rel .rtype{font-size:9px;color:var(--red);border:1px solid rgba(139,37,0,0.3);padding:1px 5px;border-radius:2px;margin-left:6px}

@media(max-width:700px){
  .tab{padding:6px 8px;font-size:10px}
  .dcard{padding:16px}
  .ded-grid{grid-template-columns:repeat(2,1fr)}
  #rpanel{width:100%;right:-100%}
  #cover .title-l{font-size:36px;letter-spacing:6px}
  #povsw button{padding:5px 14px}
  .bubble{max-width:84%}
  @keyframes tr{0%{opacity:0;letter-spacing:25px;filter:blur(4px)}100%{opacity:1;letter-spacing:6px;filter:blur(0)}}
}
.bigmap-link{display:block;text-align:center;padding:11px;margin-bottom:10px;font-size:12px;letter-spacing:2px;color:var(--gold-light);text-decoration:none;border:1px solid rgba(184,147,85,0.3);border-radius:4px;background:linear-gradient(135deg,rgba(184,147,85,0.1),rgba(139,37,0,0.05));transition:all 0.3s}
.bigmap-link:hover{border-color:var(--gold);background:rgba(184,147,85,0.16);box-shadow:0 0 18px rgba(184,147,85,0.2)}
.daily-head{display:flex;align-items:center;gap:12px;padding:14px;border:1px solid rgba(184,147,85,0.15);border-radius:4px;margin-bottom:10px;background:linear-gradient(135deg,rgba(0,0,0,0.2),rgba(184,147,85,0.03))}
.daily-head .ci{flex:1}
.daily-head .ci h3{font-size:16px;color:var(--gold-light);letter-spacing:2px}

.edot{display:inline-block;width:9px;height:9px;border-radius:50%;border:1px solid var(--gold);margin-left:2px;background:transparent;vertical-align:middle}
.edot.on{background:var(--gold);box-shadow:0 0 6px rgba(184,147,85,0.6)}
.nextday{padding:8px 12px;font-size:12px;font-family:inherit;background:rgba(139,37,0,0.15);border:1px solid rgba(184,147,85,0.3);color:var(--gold-light);border-radius:6px;cursor:pointer;transition:all .25s;white-space:nowrap}
.nextday:hover{background:rgba(139,37,0,0.3);border-color:var(--gold)}

.act-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.act-card{padding:14px 6px;background:rgba(184,147,85,0.05);border:1px solid rgba(184,147,85,0.2);border-radius:8px;cursor:pointer;text-align:center;transition:all .25s;font-family:inherit;color:var(--paper)}
.act-card:hover{background:rgba(184,147,85,0.14);border-color:var(--gold);transform:translateY(-2px)}

.daily-log-t{font-size:12px;color:var(--gold);letter-spacing:2px;margin-bottom:6px;padding-bottom:5px;border-bottom:1px solid rgba(184,147,85,0.1)}
.daily-log{font-size:11.5px;line-height:2;color:rgba(255,255,255,0.55)}
.dl-line{padding:2px 0}
.dl-empty{color:rgba(255,255,255,0.25);text-align:center;padding:16px}

#pnl-invest .inv-case{font-size:13px;color:var(--gold-light);letter-spacing:1px;margin-bottom:8px}
.inv-prog{font-size:12px;color:rgba(255,255,255,0.6);margin-bottom:10px}

const SC={};
SC['case_chashi_intro']={c:'case_chashi',cn:'卷一·落魄入京',t:'茶石天坑',s:'咸德年间 · 中博六州',tx:'<p>咸德年间，中博六州。</p><p>建兴王<span class="gld">沈卫</span>兵败于东北茶石河，敦州一线随即沦陷，三万军士被活埋于<span class="hi">茶石天坑</span>——那是一道能吞人的天险，也成了一座三万人的坟。</p><p>兵败之后，沈卫<span class="hi">自焚</span>于府中。通敌的血债、失土的罪名，尽数落在了唯一的活口身上——他的第八子<span class="gld">沈泽川</span>，字兰舟，年方十五。</p><p>"沈卫兵败茶石河……你也在其中，为何只有你活着？"审问人拨着茶沫，慢条斯理。沈泽川眼神涣散，只反复咬着一句：<span class="hi">"沈卫没有通敌。"</span></p><p><span class="cf">📌 茶石天坑</span> <span class="cf">📌 沈卫自焚</span> <span class="cf">📌 通敌冤案</span></p>',cl:['c_chashi_fall','c_shenwei_treason'],ch:[{t:'查阅茶石关战报与布防',nx:'case_chashi_detail',n:'深查',at:{quan:1}},{t:'直击诏狱那一夜的初遇',nx:'case_chashi_meet',n:'',at:{ren:1}}]};
SC['case_chashi_detail']={c:'case_chashi',cn:'卷一·落魄入京',t:'诏狱 · 杖毙之刑',s:'土袋压胸，几死还生',tx:'<p>诏狱灯火灰暗，麻绳捆得死紧。掌印<span class="gld">潘如贵</span>大步流星地走来，宣读完咸德帝口谕——锦衣卫立即动手，将沈泽川面朝地按倒。</p><p><span class="hi">土袋一层层压上前胸</span>，他仿佛被投进深潭，耳边嗡鸣、鼻息错乱，像溺水般无法呼吸。这是"杖毙"，不见血，却要人在窒息里慢慢死去。</p><p>大夫急得满头汗："药喂不进去，人是肯定熬不住的！"</p><p>可这少年，偏偏没死。</p><p><span class="cf">📌 潘如贵行刑</span> <span class="cf">📌 杖毙未死</span></p>',cl:['c_jail_beat'],ch:[{t:'看雪地里那场初遇',nx:'case_chashi_meet',n:'',at:{ren:1}}]};
SC['case_chashi_meet']={c:'case_chashi',cn:'卷一·落魄入京',t:'雪地 · 初遇咬痕',s:'"沈卫是你老子？"',tx:'<p>战靴踩过积雪，绕到沈泽川身侧。来人用脚尖拨正他的脸，靴面蹭到血迹，头盔下的声音闷沉："<span class="gld">沈卫是你老子？</span>"</p><p>沈泽川齿间咬不住血，没有作答。那人不耐，一脚将他踹翻在雪里。</p><p>就在这时——沈泽川猛地抬头，<span class="hi">一口咬了下去</span>，死死咬住那人虎口，血流不止，却怎么也不肯松口。</p><p>这人，是离北王次子<span class="gld">萧驰野</span>。他非但没有抽手，反倒在剧痛里低低笑了一声。</p><p>💗 <span class="gld">恶狗对疯犬——初见即结仇，这道咬痕，是一切的开始。</span></p><p><span class="cf">📌 萧驰野</span> <span class="cf">📌 咬痕</span></p>',cl:['c_bite_scar'],ch:[{t:'看沈泽川的最终处置',nx:'case_chashi_testimony',n:'',at:{ren:1}}]};
SC['case_chashi_testimony']={c:'case_chashi',cn:'卷一·落魄入京',t:'结仇 · 押入昭罪寺',s:'两个人的大梁子',tx:'<p>那一口，咬得萧驰野鲜血淋漓。自此两人结下大梁子，往后见面必撕咬。</p><p>朝中，太后与花党要斩草除根；却也有力量在暗处保他。大病垂死的沈泽川最终被免了死罪，<span class="gld">押入昭罪寺</span>幽禁。</p><p>而他心里，还压着另一笔账：师兄<span class="gld">纪暮</span>为把他从茶石背出，失血过多，死在了风雪之中。</p><p><span class="cf">📌 昭罪寺</span> <span class="cf">📌 纪暮之死</span></p>',cl:['c_zhaozui_temple','c_jimu_death'],ch:[{t:'【卷一完结】入昭罪寺蛰伏',nx:'case_temple_intro',n:'落魄入京·完',cc:'case_chashi',at:{ren:2}}]};
SC['case_temple_intro']={c:'case_temple',cn:'卷二·昭罪寺蛰伏',t:'昭罪寺 · 齐太傅',s:'幽禁二十年的疯癫太傅',tx:'<p>沈泽川入昭罪寺那日，阒都难得晴天。白雪覆瓦，朱墙映梅，日光在他脚前斜出一条阴阳线。他大病初愈，瘦得见骨，十五岁的前尘旧梦被朔风吹得干干净净。</p><p>在这最阴冷之处，他遇见了被囚二十年、疯癫怨世的前太子太傅<span class="gld">齐惠连</span>。</p><p>"如今……如今我又能杀谁！"齐太傅恨遍了外边所有人，今夜却要说服自己，不去恨仇人之子。他把毕生所学的<span class="hi">帝王之术</span>——《帝策》《权经》——一点点，倒进这少年心里。</p><p><span class="cf">📌 齐太傅</span> <span class="cf">📌 帝王之术</span></p>',cl:['c_qi_taifu'],ch:[{t:'查阅看守纪纲的来历',nx:'case_temple_jigang',n:'',at:{wu:1}},{t:'看沈泽川如何领差入局',nx:'case_temple_jinyiwei',n:'',at:{quan:1}}]};
SC['case_temple_jigang']={c:'case_temple',cn:'卷二·昭罪寺蛰伏',t:'师父 · 纪纲',s:'看守身份下的授业恩师',tx:'<p>昭罪寺的看守里，有一个推独轮车卸酒水、头裹粗布的人——<span class="gld">纪纲</span>。他是沈卫旧部，颈上有当年边沙入侵端州留下的<span class="hi">烧痕</span>，独子纪暮，正是为救沈泽川死在茶石。</p><p>沈泽川的镣铐被悄悄解开。纪纲以杂役之身，暗中教他拳脚、替他煎药、为他守夜。他从不提丧子之痛，只是把这少年往能活下去的方向，一寸寸地打磨。</p><p>白日读人心，夜里熬权谋——奄奄一息的阶下囚，正蜕成一柄未出鞘的刀。</p><p><span class="cf">📌 师父纪纲</span> <span class="cf">📌 端州烧痕</span></p>',cl:['c_jigang_master','c_ji_burn'],ch:[{t:'看沈泽川如何领差入局',nx:'case_temple_jinyiwei',n:'',at:{wu:1}}]};
SC['case_temple_jinyiwei']={c:'case_temple',cn:'卷二·昭罪寺蛰伏',t:'差职 · 锦衣卫',s:'一步踏进阒都棋局',tx:'<p>正旦将至，阒都街市挂满乌金"闹蛾"。外官入都，少不了向掌印<span class="gld">潘如贵</span>供奉"冰敬"，照单交钱才能太平。萧驰野翻着册子冷笑："潘如贵好威风。"</p><p>就在这盘根错节的权钱里，沈泽川竟脱镣<span class="hi">领了锦衣卫的差职</span>——一个待罪之身，一步踏进了阒都的棋局中央。</p><p>他要的不是苟活，是把整座阒都，重新洗一遍牌。</p><p><span class="cf">📌 领锦衣卫差</span></p>',cl:['c_jinyiwei'],ch:[{t:'看他结识的这批人',nx:'case_temple_qitaifu',n:'',at:{xin:1}}]};
SC['case_temple_qitaifu']={c:'case_temple',cn:'卷二·昭罪寺蛰伏',t:'群僚 · 撕咬同门',s:'才子新秀·风波暗涌',tx:'<p>朝东楼雅集上，肥胖的<span class="gld">奚鸿轩</span>做东，请来阒都才子新秀——冷面谋士<span class="gld">姚温玉</span>（字元琢）也在其列；国子监里，学生领袖<span class="gld">高仲雄</span>仰面大呼"不杀国贼，众怒难平"。</p><p>小福子溺死案、国子监学潮……一桩桩风波，都若隐若现地系在沈泽川身上。</p><p>而萧驰野酒后翻墙来寻他，撕咬照旧，却在试探里认了声"<span class="hi">同门师兄弟</span>"——"我比你年长，叫声师兄不亏。"</p><p>💗 <span class="gld">敌意里，掺进了看不懂的东西。</span></p><p><span class="cf">📌 结识群僚</span></p>',cl:['c_allies'],ch:[{t:'【卷二完结】前往秋猎政变',nx:'case_encounter_intro',n:'昭罪寺·完',cc:'case_temple',at:{quan:2}}]};
SC['case_encounter_intro']={c:'case_encounter',cn:'卷三·秋猎政变',t:'秋猎 · 南林猎场',s:'咸德帝抱病设猎',tx:'<p>十月阒都下了几场雨，枫山叶红，已见薄霜。咸德帝的病随秋意略有起色，便提早筹备<span class="gld">南林猎场</span>秋猎。</p><p>圣驾坐镇主场，御前男儿们纵马博彩。皇子<span class="gld">李建恒</span>爬不上马，蹬了好几脚才翻身而上。</p><p>表面是君臣同乐，可懂棋的人都嗅到了不寻常——这一场秋猎，各方的刀，都已在鞘中出汗。</p><p><span class="cf">📌 南林秋猎</span></p>',cl:['c_qiuli'],ch:[{t:'盯住猎场当夜的异动',nx:'case_encounter_detail',n:'',at:{jue:1}},{t:'先看政变落定后的清算',nx:'case_encounter_xiao',n:'',at:{mou:1}}]};
SC['case_encounter_detail']={c:'case_encounter',cn:'卷三·秋猎政变',t:'雨夜 · 行刺政变',s:'刀锋撞响的那一刻',tx:'<p>电闪雷鸣，雨泼成帘。疾风掠过草丛，火光扑朔的一瞬，<span class="hi">刀锋碰击的声音遽然撞响</span>——行刺与政变，同时发难。</p><p>席间乱作一团。内阁重臣<span class="gld">海良宜</span>不知哪来的力气，一头撞在潘如贵身上，喝道："<span class="hi">阉贼！勿伤吾主！</span>"</p><p><span class="gld">萧驰野中箭</span>，乔天涯、费盛俱卷入混战。泥水与血里，沈泽川与萧驰野被逼到同一处绝境——两条互相撕咬的命，第一次拴在了一起。</p><p>💗 <span class="gld">生死一线，默契初生。</span></p><p><span class="cf">📌 行刺政变</span> <span class="cf">📌 萧驰野中箭</span></p>',cl:['c_assassin','c_xiao_arrow'],ch:[{t:'看政变如何落定',nx:'case_encounter_xiao',n:'',at:{jue:1}},{t:'看两人劫后的暗流',nx:'case_encounter_tavern',n:'',at:{yi:1}}]};
SC['case_encounter_xiao']={c:'case_encounter',cn:'卷三·秋猎政变',t:'新帝 · 天琛登基',s:'朝局第一次大洗牌',tx:'<p>秋猎的血雨落定，<span class="hi">咸德帝随后驾崩</span>。新帝<span class="gld">李建恒</span>登基，改元天琛。</p><p>锦衣卫因秋猎一事全部撤了腰牌，<span class="gld">纪雷、乔天涯</span>等从五品以上尽数下狱，与<span class="gld">花思谦、潘如贵</span>一并交三法司会审。</p><p>翻云覆雨之间，旧的秩序被掀了个底朝天——而这场洗牌里，沈泽川第一次真正落下了自己的棋子。</p><p><span class="cf">📌 天琛帝登基</span> <span class="cf">📌 花党会审</span></p>',cl:['c_emperor_die','c_tianchen'],ch:[{t:'看两人劫后的暗流',nx:'case_encounter_detail',n:'',at:{mou:1}}]};
SC['case_encounter_tavern']={c:'case_encounter',cn:'卷三·秋猎政变',t:'政变后 · 默契',s:'各取所需的两个人',tx:'<p>新帝登基后，阒都的秋雨下个不停。旧瓦乌黑，白灯高悬。</p><p>沈泽川与萧驰野，一个要为父翻案、为自己而战，一个要为离北挣一条活路。没有共同的敌人时，他们就是彼此的敌人；可眼下，敌人多得数不清。</p><p>"你怎么不反驳？"萧驰野回头看他。沈泽川只道一声"哦"——那份心照不宣，比任何盟约都稳。</p><p>💗 <span class="gld">从撕咬到并肩，只隔着一场生死。</span></p><p><span class="cf">📌 乱世默契</span></p>',cl:['c_tacit'],ch:[{t:'【卷三完结】前往情动结盟',nx:'case_banquet_intro',n:'秋猎政变·完',cc:'case_encounter',at:{yi:2}}]};
SC['case_banquet_intro']={c:'case_banquet',cn:'卷四·情动结盟',t:'校场 · 山宿情动',s:'比武、同宿、味道',tx:'<p>雪一下三四天。校场比武，山中同宿，温泉氤氲。</p><p>萧驰野把干巾帕罩在沈泽川头上一顿胡乱搓揉，甩他一脸水珠；沈泽川恨极了，用光着的脚去蹬他的椅子。水雾里，两人靠得极近——"果真是我身上的味道，太刺鼻了。"</p><p>掌心的胡茬、袖袋里那方帕子……有些东西，在撕咬的缝隙里，悄悄发了芽。</p><p>💗 <span class="gld">情愫，在打闹里第一次露头。</span></p><p><span class="cf">📌 校场山宿</span></p>',cl:['c_spar'],ch:[{t:'（主动）反手把水珠甩回去，招惹他',nx:'case_banquet_teaseA',n:'招惹',at:{xin:1},ad:4},{t:'（冷淡）板着脸，任他胡闹',nx:'case_banquet_teaseB',n:'冷处理',at:{ren:1},ad:2}]};
SC['case_banquet_lu']={c:'case_banquet',cn:'卷四·情动结盟',t:'火铳 · 兰舟红潮',s:'情潮暗涌',tx:'<p>萧驰野给禁军新添<span class="gld">火铳</span>，又结交龙游商人，置办永泉港的珍珠、河州的碧玉。新帝李建恒如今很勤奋，日日请<span class="gld">海良宜</span>讲学，倒像真改了性子。</p><p>纪纲的身世（端州烧痕、与老将左千秋旧识）也在酒里露出一角。</p><p>而"<span class="hi">兰舟</span>"二字、那一抹红潮，让心止如泓的沈泽川，也终于动摇——他袖袋里躺着萧驰野的帕子，如同塞了把火，烧到了耳根。</p><p><span class="cf">📌 火铳</span> <span class="cf">📌 兰舟情动</span></p>',cl:['c_firegun','c_lanzhou'],ch:[{t:'看行刺案与救驾',nx:'case_banquet_xiao',n:'',at:{yi:1}}]};
SC['case_banquet_xiao']={c:'case_banquet',cn:'卷四·情动结盟',t:'救驾 · 封镇抚',s:'獬豸铜牌',tx:'<p>一场针对新帝的<span class="gld">行刺案</span>骤起。李建恒惶恐地把人头踢开，缩进龙椅；沈泽川单膝跪地，正色道："皇上休怕，刺客已伏诛。微臣救驾来迟，罪该万死！"</p><p>他因此在明理堂受封<span class="hi">五品锦衣卫镇抚</span>，腰牌换成印着獬豸盘云的漆金铜牌——一面写"守卫"，一面写"随驾"。世家<span class="gld">韩丞</span>被他当作垫脚石踩过，心里不痛快，却也知他正得圣恩，万万不能结怨。</p><p><span class="cf">📌 救驾</span> <span class="cf">📌 锦衣卫镇抚</span></p>',cl:['c_rescue','c_zhenfu'],ch:[{t:'看萧沈如何摊牌结盟',nx:'case_banquet_assign',n:'',at:{mou:1}},{t:'【卷四完结】前往生死定情',nx:'case_snow_intro',n:'情动结盟·完',cc:'case_banquet',at:{jue:2}}]};
SC['case_banquet_assign']={c:'case_banquet',cn:'卷四·情动结盟',t:'同舟 · 结盟',s:'一朝一野的盟约',tx:'<p>"试探只是问路石，坦诚就像宽衣解带的过程，我们循序渐进，才能有今日的促膝长谈。"萧驰野眼神冷峻。</p><p>沈泽川接道："没有共同的敌人时，他们就是自己的敌人。要让水碗不因偏重而砸翻，这比对付谁更难。"</p><p>从相看两厌，谈成了<span class="hi">同舟共济</span>——一个在朝、一个在野，两条殊途同归的路，第一次并作一条。</p><p>💗 <span class="gld">结为同盟——从此进退，两个人一起算。</span></p><p><span class="cf">📌 同舟结盟</span></p>',cl:['c_alliance'],ch:[{t:'【卷四完结】前往生死定情',nx:'case_snow_intro',n:'情动结盟·完',cc:'case_banquet',at:{jue:2}}]};
SC['case_snow_intro']={c:'case_snow',cn:'卷五·生死定情',t:'查院 · 禁军查账',s:'把旧账翻个底朝天',tx:'<p>朝堂肃穆，落针可闻。萧驰野缓缓摘下自己的腰牌——他与沈泽川，正借<span class="gld">查院</span>之权，把阒都的旧账翻个底朝天。</p><p>随行御史<span class="gld">余小再</span>品阶不高却权重，急得满头大汗，在两人的唇枪舌剑间来回打圆场。禁军办差大院的灯火亮到天明，户部的人算得头晕眼花，把有问题的账目整理成册，连同行刺案一起呈到李建恒案头。</p><p>行刺案就此草草收尾，波涛汹涌，倏忽被风雪掩埋。</p><p><span class="cf">📌 查院查账</span></p>',cl:['c_chayuan'],ch:[{t:'以沈泽川视角走进这段日子',nx:'case_snow_shen',n:'',pov:'shen'},{t:'以萧驰野视角走进这段日子',nx:'case_snow_xiao',n:'',pov:'xiao'}]};
SC['case_snow_shen']={c:'case_snow',cn:'卷五·生死定情',t:'疫病 · 昭罪寺',s:'煎药遮口的日子',tx:'<p>雨珠乱跳，泥点迸溅。阒都<span class="hi">疫病</span>大作，昭罪寺急匆匆地进出着人，遮雨棚下草药苦味四处弥漫，守炉的锦衣卫都以巾帕遮口。</p><p>皇宫严禁出入，人心惶惶。慕嫔慕如亲手守着病榻，凡事亲力亲为。</p><p>生死无常的时节，那个总与你撕咬的人，忽然成了你最怕失去的人。</p><p>💗 <span class="gld">越是命悬一线，越舍不得。</span></p><p><span class="cf">📌 疫病</span></p>',cl:['c_plague'],ch:[{t:'守在他病榻边',nx:'case_snow_fight',n:'厮守',ad:12,at:{xin:2}},{t:'冷静处置疫情与朝局',nx:'case_snow_words',n:'并进',ad:6,at:{quan:1}}]};
SC['case_snow_xiao']={c:'case_snow',cn:'卷五·生死定情',t:'病榻 · 君臣言和',s:'冒雪探望',tx:'<p>雪连下了几日。萧驰野染了风寒又强撑面壁，最终被击倒在榻，病得起不了身。</p><p>李建恒冒雪出行，摆驾离北王府，携领诸臣，与萧驰野又做回了"好兄弟"。</p><p>可萧驰野心里挂着的，从来不是圣眷——是昭罪寺里那个瘦而倔强、会回头咬他一口的人。氅衣太大，顺着肩头滑下，把人整个裹进他的味道里。</p><p>💗 <span class="gld">"我好爱你啊。"——这话，迟早要说出口。</span></p><p><span class="cf">📌 病榻言和</span></p>',cl:['c_reconcile'],ch:[{t:'收手，认真问他此心',nx:'case_snow_question',n:'真心',ad:12,at:{yi:2}},{t:'守在他身边不再走',nx:'case_snow_fight',n:'厮守',ad:12,at:{yi:1}}]};
SC['case_snow_fight']={c:'case_snow',cn:'卷五·生死定情',t:'生死 · 共枕定情',s:'情潮坦诚相见',tx:'<p>宿雨初歇，被褥间潮湿的暧昧犹存。</p><p>生死之间，情潮再压不住——撕扯化作抚触，较量化作亲吻。年富力强的坦诚坦荡相见，<span class="hi">共枕、云雨</span>，把餍足感越推越远，变成食髓知味后的意犹未尽。</p><p>从见面撕咬，到肌肤相亲；从大梁子，到再难分开。</p><p>💗 <span class="gld">定情——恶狗与疯犬，认了彼此。</span></p><p><span class="cf">📌 共枕定情</span></p>',cl:['c_dingqing'],ch:[{t:'【卷五完结】疫后开寺，走出昭罪寺',nx:'case_snow_words',n:'',at:{ren:1}}]};
SC['case_snow_question']={c:'case_snow',cn:'卷五·生死定情',t:'一问 · 此心',s:'"你恨谁？我帮你记着。"',tx:'<p>"你恨谁？"萧驰野收手，认真地看着他。</p><p>沈泽川沉默很久："我恨的人很多。你想听哪个？"</p><p>"一个一个说。我有的是时间。"他笑着，伸手把人拽起来——从此这条路，两个人一起走，一个仇一个仇地报。</p><p>💗 <span class="gld">此心已定。</span></p><p><span class="cf">📌 共枕定情</span></p>',cl:['c_dingqing'],ch:[{t:'【卷五完结】疫后开寺，走出昭罪寺',nx:'case_snow_words',n:'',at:{ren:1}}]};
SC['case_snow_words']={c:'case_snow',cn:'卷五·生死定情',t:'开寺 · 出樊笼',s:'萧任总督，沈出昭罪寺',tx:'<p>疫后论功，圣旨仓促而至。昭罪寺院里跪倒一片，传旨太监哈着腰："总督快快请起！"</p><p><span class="gld">萧驰野任总督</span>，而<span class="hi">沈泽川，终于走出了昭罪寺</span>。</p><p>困了这么久的两只囚鸟，一起飞出了这座笼子的第一道墙。前路仍是刀山，可这一次，他们并肩。</p><p>💗 <span class="gld">出笼同行。</span></p><p><span class="cf">📌 开寺出樊笼</span></p>',cl:['c_kaisi'],ch:[{t:'【卷五完结】前往封赏倒魏',nx:'case_censor_intro',n:'生死定情·完',cc:'case_snow'}]};
SC['case_censor_intro']={c:'case_censor',cn:'卷六·封赏倒魏',t:'进爵 · 封赏',s:'定都侯与越级提拔',tx:'<p>春时植种，各部忙得焦头烂额。李建恒大行封赏：<span class="gld">萧驰野进定都侯</span>，<span class="gld">沈泽川越级提拔</span>为从五品——起初内阁不同意，是<span class="gld">岑愈</span>上奏力荐，<span class="gld">海良宜</span>也因疫病一事对沈泽川大为改观，才定了下来。</p><p>推杯换盏间，韩丞被酒水溅了满袍，狼狈不堪。昔日的落水狗，如今一开口便能要人性命。</p><p>💗 <span class="gld">两个人的手，第一次同时按在了朝堂的棋盘上。</span></p><p><span class="cf">📌 进爵封赏</span></p>',cl:['c_fengshang'],ch:[{t:'先与他说会儿话',nx:'case_censor_ye',n:'',at:{xin:1}},{t:'借势清查：抄薛府、拿奚鸿轩',nx:'case_censor_ye',n:'',at:{quan:1}}]};
SC['case_censor_probe']={c:'case_censor',cn:'卷六·封赏倒魏',t:'抄府 · 查旧案',s:'诏狱与刑部的旧卷',tx:'<p>锦衣卫涌进<span class="gld">薛府</span>，各院被惊醒，女眷惶恐地挤作一团——沈泽川在他们眼里，就是吃人的狼虎。薛修易扑过去拽住兄长<span class="gld">薛修卓</span>，恨道："你做了什么，竟惹来锦衣卫！"</p><p><span class="gld">奚鸿轩</span>下狱，牵出诏狱与刑部积压的旧案。沈泽川光是诏狱的案子就查了半月，连刑部封了条子的旧卷也一并翻出。</p><p>他把军粮里的每一笔烂账，一页页往真相上钉。</p><p><span class="cf">📌 抄薛府</span> <span class="cf">📌 奚鸿轩下狱</span></p>',cl:['c_chaofu','c_xi_jail'],ch:[{t:'钉死中博兵败的真凶',nx:'case_censor_clash',n:'',at:{quan:1}}]};
SC['case_censor_clash']={c:'case_censor',cn:'卷六·封赏倒魏',t:'军粮案 · 真凶浮出',s:'"沈卫没有通敌"',tx:'<p>真相水落石出：户部尚书<span class="gld">魏怀古</span>自咸德四年起，勾结厥西布政司<span class="gld">杨诚</span>，在督办军粮时低价收购、<span class="hi">高价倒卖给奚鸿轩</span>，再经水旱两路发往中博六州与虚海赚取暴利——正是<span class="hi">断沈卫粮草、致茶石关兵败的黑手</span>。</p><p>年逾五十的魏怀古被剥了官袍，戴着镣铐，隔着铁栏对萧驰野道："我的供词已经呈上去了。"</p><p>"沈卫没有通敌。"这句压了沈泽川半生的话，第一次有了昭告天下的铁证。</p><p><span class="cf">📌 魏怀古军粮案</span> <span class="cf">📌 中博真凶</span></p>',cl:['c_weihuaigu','c_grain_deal'],ch:[{t:'看倒魏之后的权柄之巅',nx:'case_censor_victory',n:'',at:{quan:1}}]};
SC['case_zhongbo_intro']={c:'case_zhongbo',cn:'卷七·决裂出走',t:'决裂 · 与阒都翻脸',s:'一麻袋人头的宣告',tx:'<p>禁军贸然进军，仅存的锦衣卫带回<span class="hi">一麻袋人头</span>——这昭示着沈泽川、萧驰野与阒都<span class="hi">彻底决裂</span>，消息传回，满城轰动。</p><p>圣旨救不了兵，朝廷喂不饱马。既然这座笼子给不了活路，那就自己去挣。</p><p>💗 <span class="gld">最凶险的一步，两个人一起迈出去。</span></p><p><span class="cf">📌 与阒都决裂</span></p>',cl:['c_break'],ch:[{t:'亡命南奔',nx:'case_zhongbo_flee',n:'',at:{jue:1}}]};
SC['case_zhongbo_clue']={c:'case_zhongbo',cn:'卷七·决裂出走',t:'南下 · 茨州立基',s:'又为乱世雄',tx:'<p>二人叛出阒都，南下<span class="gld">中博</span>。周桂按萧驰野的原话，在庭院里设了一桌家常菜接风。</p><p>他们以<span class="gld">茨州</span>为根基，招兵买马、整肃地方——"又为乱世雄"的经营，就此起步。</p><p>阒都的囚鸟，终于落到了自己的地上，脚下是实打实的土。</p><p><span class="cf">📌 茨州立基</span></p>',cl:['c_south'],ch:[{t:'风雨同舟的一夜',nx:'case_zhongbo_night',n:'',at:{yi:1}}]};
SC['case_zhongbo_reveal']={c:'case_zhongbo',cn:'卷七·决裂出走',t:'认定 · 乱世同行',s:'殊途同归',tx:'<p>禁军的巡防队巡在大街小巷，萧驰野背着沈泽川走在阴影下的街沿。夏夜有些热，脊背相贴，谁也没说话。</p><p>没有家可回的沈泽川，和尚有离北可惦记的萧驰野，走上了同一条路——他们所求的目标，本就是一致的。</p><p>💗 <span class="gld">生死与共，此生认定。爱情，就是两个人相互适应、相互改变的过程。</span></p><p><span class="cf">📌 认定彼此</span></p>',cl:['c_recognize'],ch:[{t:'【卷七完结】前往经营中博',nx:'case_plague_intro',n:'决裂出走·完',cc:'case_zhongbo',at:{yi:2}}]};
SC['case_plague_intro']={c:'case_plague',cn:'卷八·经营中博',t:'招抚 · 茨州守备军',s:'收服诸将',tx:'<p>软硬兼施，沈泽川收服茨州守将<span class="gld">周桂</span>，又带着几箱白银去招抚土匪出身的悍将<span class="gld">雷常鸣、雷惊蛰</span>与<span class="gld">历熊</span>——码得整整齐齐的银子，比刀子更能收心。</p><p>茨州守备军就此成军。沈泽川运筹于内，萧驰野奔袭于外，说三日必回便三日必回，深夜赶回城下，火把把城墙照得通明。</p><p>💗 <span class="gld">分头做事，聚少离多，牵挂日深。</span></p><p><span class="cf">📌 茨州守备军</span></p>',cl:['c_recruit'],ch:[{t:'城郊施粥，收拢民心',nx:'case_plague_relief',n:'',at:{xin:1}}]};
SC['case_plague_relief']={c:'case_plague',cn:'卷八·经营中博',t:'施粥 · 白衣公子',s:'民心所向',tx:'<p>城外难民汇聚成海，不过一夜，"有人设棚施粥"的消息就传遍方圆十几里。</p><p>土匪来抢，怎料城外百姓群起而攻，跺脚声犹如惊雷，骂声哭声掺作洪水，把土匪淹没。</p><p>城内外争相打听：那施粥的<span class="hi">白衣公子</span>到底是谁？有说是周桂的幕僚，有说是孔岭的远侄……没人知道，那正是沈泽川。得民心者，方能得中博。</p><p><span class="cf">📌 施粥收民心</span></p>',cl:['c_congee'],ch:[{t:'等他奔袭归来',nx:'case_plague_miss',n:'',at:{xin:1}}]};
SC['case_plague_purge']={c:'case_plague',cn:'卷八·经营中博',t:'中毒 · 九年线头',s:'边博营的火',tx:'<p>暗处的刀先落下——<span class="gld">姚温玉</span>在潘府<span class="hi">中毒</span>，大夫说不出所以然，命悬一线（照月郡主与潘远脱不了干系）。</p><p>与此同时，离北的<span class="gld">边博营</span>遭边沙突袭。萧既明在东南先后设沙一、沙二、沙三营做补给，禁军亢奋大于恐惧，狼虎般冲杀进去——这是他们迄今打得最痛快的一仗。</p><p>而一桩<span class="hi">九年前的旧案</span>线头，也在此时浮出。沈泽川意识到：中博兵败，不过是九年前那盘大棋落下的一子。</p><p><span class="cf">📌 姚温玉中毒</span> <span class="cf">📌 九年旧案</span> <span class="cf">📌 边博营敌袭</span></p>',cl:['c_yao_poison','c_ninecase'],ch:[{t:'【卷八完结】前往敦州旧案',nx:'case_oldcase_intro',n:'经营中博·完',cc:'case_plague',at:{mou:1}}]};
SC['case_oldcase_intro']={c:'case_oldcase',cn:'卷九·敦州旧案',t:'敦州 · 格达勒',s:'战线推进',tx:'<p>战线推进到<span class="gld">敦州</span>。守将<span class="gld">澹台虎</span>舍不得离北的兄弟、更舍不得总督；叛将<span class="gld">颜何如</span>把宅院修得再牢，也挡不住攻城器械。</p><p>"<span class="hi">格达勒</span>"这个名字，反复出现在边沙人的口中——这已是沈泽川第二次听到。他隐隐觉得，这三个字，连着父亲那桩讳莫如深的旧案。</p><p><span class="cf">📌 敦州</span> <span class="cf">📌 格达勒</span></p>',cl:['c_dunzhou','c_gedale'],ch:[{t:'深挖沈卫的旧案',nx:'case_oldcase_dig',n:'',at:{mou:1}}]};
SC['case_oldcase_dig']={c:'case_oldcase',cn:'卷九·敦州旧案',t:'旧案 · 白茶之秘',s:'追溯光诚帝朝',tx:'<p>旧案的底，一路追溯到<span class="hi">光诚帝时期</span>。</p><p>永宜年间，中博敦、端两州最为富庶，沈卫统号各州守备。而那几年里，沈卫竟与边沙女子<span class="gld">白茶</span>做了数年"<span class="hi">同床异梦</span>"的夫妻——两个人各怀心思，都在猜测对方到底是谁。</p><p>白茶、格达勒、光诚帝朝……父亲背负的，从不只是通敌的冤，而是一个被朝廷、被世家、被边沙层层缠绕的死局。</p><p><span class="cf">📌 白茶之秘</span> <span class="cf">📌 光诚帝朝</span></p>',cl:['c_baicha','c_guangcheng'],ch:[{t:'旧伤发作·他来守护',nx:'case_oldcase_care',n:'',at:{ren:1}}]};
SC['case_oldcase_truth']={c:'case_oldcase',cn:'卷九·敦州旧案',t:'昭雪 · 鸿雁雪战',s:'沈卫非通敌',tx:'<p>铁证在握，<span class="hi">沈卫昭雪</span>指日可待。</p><p>而边关，<span class="gld">鸿雁山脉</span>暴风雪临袭战场，盐粒般的雪刮得"沙沙"作响，马道塌得厉害，粮车根本进不了交战地。哈森压境，离北还沉浸在悲痛里，边沙就再度来袭。</p><p>危急关头，启东大帅<span class="gld">戚竹音</span>只带着几十个亲兵冒雪赶到——为父翻案与为天下而战，终于合成了同一件事。</p><p>💗 <span class="gld">并肩翻案，情比金坚。</span></p><p><span class="cf">📌 沈卫昭雪</span> <span class="cf">📌 鸿雁雪战</span></p>',cl:['c_vindicate','c_snowbattle'],ch:[{t:'【卷九完结】前往醉倒狂歌',nx:'case_final_intro',n:'敦州旧案·完',cc:'case_oldcase',at:{quan:2}}]};
SC['case_final_intro']={c:'case_final',cn:'卷十·醉倒狂歌',t:'端州 · 女帝遇毒',s:'终局将启',tx:'<p>年关一过，中博暴雪。战事转入<span class="gld">端州—洛山—茶石天坑</span>一线，与边沙十二部鏖战经年。二月萧驰野出兵端州，敦州澹台虎策应，北面萧既明遣邬子余率五千离北军南下。</p><p>阒都同时风云突变：储君<span class="gld">李剑霆</span>——一个"既非女子，也非男儿"、身世为世家所攻讦的储君——<span class="hi">中毒转危为安</span>，是贴身的<span class="gld">风泉</span>把要入口的药都亲尝了。丹城案里<span class="gld">潘蔺</span>之死牵动朝局，理财能臣<span class="gld">梁漼山</span>（崇深大人）登场。</p><p><span class="cf">📌 女帝遇毒</span> <span class="cf">📌 梁漼山</span></p>',cl:['c_lijt_poison','c_liangcuishan'],ch:[{t:'与边沙十二部决一死战',nx:'case_final_war',n:'',at:{jue:1}}]};
SC['case_final_war']={c:'case_final',cn:'卷十·醉倒狂歌',t:'决战 · 薛修卓迎储',s:'狼鹰折翼',tx:'<p>端州守战、洛山鏖兵，离北群鹰横穿苍茫，浪淘雪襟一往无前。自端州打到<span class="gld">漠三川</span>、格达勒，<span class="gld">边沙十二部</span>覆灭，狼鹰折翼，<span class="hi">虹鹰旗霎时燃烧</span>。</p><p>阒都终盘：<span class="gld">薛修卓</span>（延清）迎储君回宫，向内阁出示<span class="hi">先帝朱批与秦王私章</span>，世家阵营裂解反转——他一把摘掉了韩丞的腰牌。戚竹音一度被指"叛"，启东百年威望悬于一线。</p><p><span class="cf">📌 决战边沙</span> <span class="cf">📌 薛修卓迎储君</span></p>',cl:['c_final_war','c_xue_welcome'],ch:[{t:'战前·与他定下生死之约',nx:'case_final_vow',n:'',at:{yi:1}}]};
SC['case_final_throne']={c:'case_final',cn:'卷十·醉倒狂歌',t:'终盘 · 沈泽川登基HE',s:'醉倒狂歌中',tx:'<p>阒都决战，王宫烧了大半。雾锁殿丛，储君<span class="gld">李剑霆（女帝）</span>的身形很快被凄雨遮掩——<span class="hi">女帝薨逝</span>，如一朵散得太快的遗云。</p><p>乱局落定，众望所归，<span class="gld">沈泽川登基称帝</span>，帝号<span class="hi">淳圣帝</span>，改国号<span class="hi">大靖</span>。大靖三位异姓王：戚竹音虎踞启东、萧既明镇守离北，而<span class="gld">萧驰野</span>——离北狼旗下的"狼王"，执掌北疆军权。</p><p>"圣旨救不了我的兵，朝廷喂不饱我的马……<span class="hi">我要翻过那座山，我要为自己一战。此身虽是大靖身，可此心仍是大周心。</span>"</p><p>而大婚，办在<span class="gld">离北</span>的草野上——仪仗列于苍穹之下，皇帝沈泽川与萧驰野，在天地间拜了堂。</p><p>💗 <span class="gld">白首偕老。恶狗与疯犬，翻过所有的山，终成眷属。</span></p><p><span class="cf">📌 女帝薨逝</span> <span class="cf">📌 沈泽川登基·淳圣帝</span> <span class="cf">📌 离北大婚HE</span></p>',cl:['c_female_emperor','c_regent','c_he_wedding'],ch:[{t:'离北草野·拜天地',nx:'case_final_wedding',n:'',at:{yi:1}}]};
SC['case_ending']={c:'case_ending',cn:'终章',t:'暗阁 · 结案呈词',s:'甲字第七号 · 沈萧秘卷',tx:'<p>十卷案牍，至此封存。</p><p>从茶石天坑的血雪、昭罪寺的寒夜，到秋猎的雷雨、都门的决裂，从中博的施粥到敦州的旧案，直至醉倒狂歌的登基与大婚——<span class="gld">沈泽川</span>与<span class="gld">萧驰野</span>的命运，已被暗阁一一记录在案。</p><p>💗 <span class="gld">恶狗对疯犬，殊途同归。将进酒，杯莫停。</span></p><p style="text-align:center;font-size:14px;letter-spacing:4px;color:var(--red);margin:12px 0;">—— 甲字第七号 · 封 ——</p>',ch:[{t:'重览秘卷（重新开始）',nx:'case_chashi_intro',n:'',rst:true}]};

SC['case_censor_ye']={c:'case_censor',cn:'卷六·封赏倒魏',t:'夜话 · 帝京双璧',s:'封赏之后的第一个夜',tx:'<p>封赏落定，定都侯与新贵御史，一朝一野，从此再不必躲在暗处相见。</p><p>这夜萧驰野翻窗进来，脱了官靴往榻上一歪："出了昭罪寺，倒把人养金贵了。"沈泽川正在灯下看奚鸿轩递来的账册，头也不抬："看你的账。多事。"</p><p>可萧驰野凑过去，下巴抵在他肩上，胡茬蹭得人发痒。窗外月色正好——那些在昭罪寺里不敢说出口的话，如今终于有了安放的地方。</p><p>💗 <span class="gld">身份翻转之后，久别的亲昵。他们终于能光明正大地，属于彼此。</span></p><p><span class="cf">📌 帝京双璧</span></p>',cl:['c_dijing'],ch:[{t:'借势清查：抄薛府、拿奚鸿轩',nx:'case_censor_probe',n:'',at:{quan:1}}]};
SC['case_censor_victory']={c:'case_censor',cn:'卷六·封赏倒魏',t:'权柄 · 昭雪之诺',s:'立于顶端的相视',tx:'<p>魏怀古下狱，军粮案铁证如山。沈泽川站在明理堂外，看满朝文武因他一句话而变色——这是他第一次，真切地握住了能替父翻案的权柄。</p><p>萧驰野走到他身侧，压低声音："算完这一笔，还有下一笔。这天下欠你沈家的账，我陪你一笔一笔地算。"</p><p>沈泽川侧过脸看他，眼里第一次有了不加掩饰的暖意。</p><p>💗 <span class="gld">并肩权斗，如臂使指——你的仇，就是我的仇。</span></p><p><span class="cf">📌 昭雪之诺</span></p>',cl:['c_victory'],ch:[{t:'【卷六完结】前往决裂出走',nx:'case_zhongbo_intro',n:'封赏倒魏·完',cc:'case_censor',at:{quan:2}}]};
SC['case_zhongbo_flee']={c:'case_zhongbo',cn:'卷七·决裂出走',t:'亡命 · 雨夜出逃',s:'生死同路',tx:'<p>与阒都彻底翻脸的那一夜，风雨大作。禁军追兵在后，两人一路南奔，泥水溅满衣袍。</p><p>沈泽川旧伤未愈，几次险些从马上栽下，都被萧驰野一把捞住、按回怀里："抓紧我。掉下去，我可不回头捡。"话虽狠，手却稳得很。</p><p>亡命天涯的路上，他们把命交到了彼此手里。</p><p>💗 <span class="gld">生死同路——从此以后，要死，也是死在一处。</span></p><p><span class="cf">📌 雨夜出逃</span></p>',cl:['c_flee'],ch:[{t:'南下中博，另起炉灶',nx:'case_zhongbo_clue',n:'',at:{jue:1}}]};
SC['case_zhongbo_night']={c:'case_zhongbo',cn:'卷七·决裂出走',t:'风雨 · 认定一夜',s:'背影相贴的安稳',tx:'<p>茨州初定的那夜，破庙里只点得起一盏灯。萧驰野背着沈泽川走过巡防的街沿，夏夜闷热，脊背相贴，谁也没说话。</p><p>"沈泽川，"萧驰野忽然开口，"你没有家了。"沈泽川沉默片刻："嗯。""那往后，"他把人往上颠了颠，"我就是你的家。"</p><p>灯火昏黄，照着两个再没有退路、却也再不孤单的人。</p><p>💗 <span class="gld">认定彼此——你没有的家，我给你。</span></p><p><span class="cf">📌 风雨同舟</span></p>',cl:['c_night7'],ch:[{t:'看两人如何认定彼此',nx:'case_zhongbo_reveal',n:'',at:{yi:1}}]};
SC['case_plague_miss']={c:'case_plague',cn:'卷八·经营中博',t:'重逢 · 奔袭归来',s:'三日必回',tx:'<p>萧驰野说三日必回，就是三日必回。他深夜赶回茨州城下，城门早已为他开着，火把把城墙上下照得通明。</p><p>他一身风尘、满面征尘地翻身下马，先不去卸甲，径直来寻那个在灯下等他的人。"想我没有？"沈泽川递上热汤："汤要凉了。"——这便是想了。</p><p>聚少离多的日子里，每一次归来，都像重新拥有一次。</p><p>💗 <span class="gld">聚少离多的牵挂——他在外征战，她在内运筹，心却never离开过对方。</span></p><p><span class="cf">📌 奔袭归来</span></p>',cl:['c_miss'],ch:[{t:'边关急报：边博营遇袭',nx:'case_plague_siege',n:'',at:{jue:1}}]};
SC['case_plague_siege']={c:'case_plague',cn:'卷八·经营中博',t:'边博营 · 敌袭',s:'狼虎之师',tx:'<p>边博营是离北边线上重要的补给地。萧既明为让前线保持体力，在东南先后设了沙一、沙二、沙三营做接应。</p><p>边沙骑兵趁夜突袭，禁军亢奋大于恐惧——他们迄今没打过一场痛快的仗，这一次，狼虎般地冲杀进去。刀子一轮轮逼过去，脚下泥土都被血溅得潮湿。</p><p>萧驰野立在阵前，眼里是沙场独有的锋芒。而千里之外，沈泽川正为他把每一分粮草算到毫厘。</p><p><span class="cf">📌 边博营敌袭</span></p>',cl:['c_biansha_siege'],ch:[{t:'暗处的刀也已出鞘',nx:'case_plague_purge',n:'',at:{mou:1}}]};
SC['case_oldcase_care']={c:'case_oldcase',cn:'卷九·敦州旧案',t:'旧伤 · 生死守护',s:'你的命是我的',tx:'<p>敦州奔波，风雪苦寒。沈泽川右手的旧伤突然发作，火燎般的痛感让他清醒——张开手掌，两指竟不能自控地颤抖。</p><p>丁桃吓坏了。萧驰野赶来时，二话不说把人整个圈进怀里，声音压得极低却发着抖："查案的是我，卖命的凭什么是你？"</p><p>他握着那只不听使唤的手，一寸寸焐热。"沈泽川，你记着——<span class="hi">你的命是我的</span>。你死，得先问过我。"</p><p>💗 <span class="gld">情比金坚——他怕的从来不是天下，是失去这个人。</span></p><p><span class="cf">📌 生死守护</span></p>',cl:['c_care'],ch:[{t:'（示弱）难得地，靠进他怀里',nx:'case_oldcase_careA',n:'示弱',at:{ren:1},ad:8},{t:'（逞强）抽回手，冷声说"我没事"',nx:'case_oldcase_careB',n:'逞强',at:{wu:1},ad:3}]};
SC['case_final_vow']={c:'case_final',cn:'卷十·醉倒狂歌',t:'战前 · 生死之约',s:'翻过这座山之后',tx:'<p>决战前夕，端州城头风雪未歇。两人并肩看着漫天苍茫，谁都清楚——这一仗之后，不是生，就是死。</p><p>"打完这仗，"萧驰野忽然道，"我带你回离北。草野上跑马，冰河上踏冰，没有阒都，没有那些烂账。"</p><p>沈泽川轻轻笑了："一言为定。"他伸出那只旧伤初愈的手，与萧驰野十指相扣——这是他们之间，最郑重的一次约定。</p><p>💗 <span class="gld">生死之约——翻过这座山，我要带你，去过我们自己的日子。</span></p><p><span class="cf">📌 生死之约</span></p>',cl:['c_vow'],ch:[{t:'看终盘落定',nx:'case_final_throne',n:'',at:{jue:1}}]};
SC['case_final_wedding']={c:'case_final',cn:'卷十·醉倒狂歌',t:'大婚 · 离北拜天地',s:'醉倒狂歌中',tx:'<p>"皇帝大婚更难哪。"丁桃摇头晃脑。钦天监算了良辰，礼部为着"阒都给离北送、婚却要在离北成"发愁——可萧驰野一句"离北阔着呢"，便定了下来。</p><p>于是这场旷古未有的大婚，办在了<span class="gld">离北</span>的草野上。仪仗队列于苍穹之下，天高地阔，比任何金銮殿都气派。淳圣帝<span class="gld">沈泽川</span>一身喜色，与<span class="gld">萧驰野</span>在天地之间，实实在在地拜了堂——这才叫真正的"拜天地"。</p><p>从茶石天坑的血雪，到离北草野的红妆；从那一口结仇的咬痕，到今日十指相扣的白首。恶狗与疯犬，翻过了所有的山。</p><p>💗 <span class="gld">白首偕老。将进酒，杯莫停——这一杯，敬我们自己挣来的一生。</span></p><p><span class="cf">📌 离北大婚</span> <span class="cf">📌 HE</span></p>',cl:['c_wedding'],ch:[{t:'【全书完结】查看终章封存',nx:'case_ending',n:'全书完结',cc:'case_final'}]};

SC['case_banquet_teaseA']={c:'case_banquet',cn:'卷四·情动结盟',t:'山宿 · 招惹',s:'（你选择主动）',tx:'<p>你反手一撩，把满掌的水珠尽数甩回萧驰野脸上。他被激得眼睛都睁不开，愣了一瞬，随即低低笑出声。</p><p>"沈兰舟，"他抹了把脸，声音沉下来，一步逼近，"你这是……在勾我？"</p><p>你没退，仰着下巴看他："怕了？"</p><p>他伸手扣住你的后颈，拇指摩挲着你的唇角，笑意里有藏不住的灼热："怕？我巴不得。"——水雾氤氲，两个人的呼吸缠到了一处。</p><p>💗 <span class="gld">你主动递出的这一寸，他贪心地要了一尺。</span></p>',cl:[],ch:[{t:'继续看火铳与兰舟一线',nx:'case_banquet_lu',n:'',at:{yi:1}}]};
SC['case_banquet_teaseB']={c:'case_banquet',cn:'卷四·情动结盟',t:'山宿 · 冷处理',s:'（你选择冷淡）',tx:'<p>你板着脸，由着他胡闹，一言不发地系好衣带，转身要走。</p><p>萧驰野偏不让，一把拽住你的手腕，把人半圈进怀里："别装了。你袖袋里那方帕子，都揣了多少天了？"</p><p>你动作一僵。他凑到你耳边，气息滚烫："越冷，我越想把你捂化。沈泽川，你躲得过今天，躲不过我。"</p><p>你没回头，可耳根，到底还是红了。</p><p>💗 <span class="gld">你的冷，只是把火压进了心里——他偏要，一寸寸替你烧起来。</span></p>',cl:[],ch:[{t:'继续看火铳与兰舟一线',nx:'case_banquet_lu',n:'',at:{yi:1}}]};
SC['case_oldcase_careA']={c:'case_oldcase',cn:'卷九·敦州旧案',t:'守护 · 示弱',s:'（你选择靠近他）',tx:'<p>难得地，你没有逞强。你顺着他的力道，把额头抵在他的肩窝里，闭上眼。</p><p>萧驰野整个人都僵了一下，随即收紧手臂，把你圈得更紧。他的下巴抵着你的发顶，声音闷闷的，带着劫后余生的后怕："……这才对。你在我这儿，不用撑着。"</p><p>你听见他心跳得很快。这个在沙场上从不皱眉的人，此刻却像捧着一件易碎的东西。</p><p>"萧驰野，"你极轻地说，"我不会死在你前头。"</p><p>💗 <span class="gld">你把最软的一面，只给他一个人看。</span></p>',cl:[],ch:[{t:'把铁证钉死，为父昭雪',nx:'case_oldcase_truth',n:'',at:{quan:1}}]};
SC['case_oldcase_careB']={c:'case_oldcase',cn:'卷九·敦州旧案',t:'守护 · 逞强',s:'（你选择推开他）',tx:'<p>你抽回那只发颤的手，别过脸："我没事。案子要紧，别耽误工夫。"</p><p>萧驰野盯着你看了很久，忽然一把重新攥住你的手，力道大得发疼："沈泽川，你嘴硬给谁看？"</p><p>他把你那只手按在自己胸口，那里心跳擂鼓："你要是有个三长两短，这天下我替谁打？你先给我好好活着，其余的，都往后稍稍。"</p><p>你没再挣。逞强了这么多年，头一回，有人比你自己还怕你死。</p><p>💗 <span class="gld">你越是逞强，他越是把你护得死紧。</span></p>',cl:[],ch:[{t:'把铁证钉死，为父昭雪',nx:'case_oldcase_truth',n:'',at:{quan:1}}]};

const CHARS=[{id:'shen',n:'沈泽川',ro:'建兴王第八子·待罪之人',info:'茶石关唯一活口。被押入昭罪寺后外表看似文弱，实则心性坚韧异常。白天随纪纲练拳习武，夜晚听齐太傅传授帝王之术与权谋之道。短短数月，从一个奄奄一息的阶下囚变为暗中积蓄力量的复仇者。他的心中藏着对父亲沈卫的复杂情感、对师兄纪暮的愧疚，以及一个尚未明确的野心。',fa:'待罪之人'},{id:'xiao',n:'萧驰野',ro:'离北王次子·骁骑将军',info:'离北铁骑的少年将军。不拘小节，善饮好斗，在沙场上所向披靡。但父王萧方旬的突然离世让他一夜之间扛起了离北的半壁江山。他南下阒都表面是为朝廷效力，实则在暗中寻找能够帮助离北突围的盟友。昭罪寺里那个瘦弱却倔强的少年，让他看到了某种可能性——也看到了某个让他无法移开视线的人。',fa:'离北军'},{id:'jigang',n:'纪纲',ro:'沈泽川之师·纪家拳传人',info:'原建兴王府武师，相貌被火烧毁，面目狰狞，但为人沉默寡言，忠义无双。独子纪暮在茶石关为救沈泽川而死。他将丧子之痛深埋心底，把全部的精力投入到培养沈泽川之中——这不仅是对沈卫旧恩的报答，更是对儿子遗志的延续。',fa:'昭罪寺'},{id:'qi',n:'齐惠连',ro:'前太子太傅·帝王之术传人',info:'曾是大周太子的老师，因太子被废受牵连，囚禁昭罪寺近二十年。漫长岁月中他将毕生所学锤炼为一套完整的帝王之术——包括《帝策》和《权经》。在沈泽川身上他看到了复仇的希望。他教沈泽川朝堂上每一个人的弱点，以及如何在这场权力游戏中生存并取胜。',fa:'昭罪寺'},{id:'huasiqian',n:'花思谦',ro:'太后心腹·内阁辅臣',info:'太后花氏最信任的朝臣，朝中党羽众多。表面儒雅恭谨，实则城府极深。多次在朝堂上欲置沈泽川于死地，但并非单纯为了讨好太后——他深知沈家案背后牵涉的秘密可能动摇花党根基。',fa:'花党'},{id:'empress',n:'太后花香漪',ro:'咸德帝生母·后宫之主',info:'实际掌控大周朝政的女人。对沈家充满不可调和的敌意，表面是为国除害，实则是为了掩盖一桩陈年旧事——沈卫手中曾握有她不可告人的秘密。沈泽川的存在是她最大的威胁。',fa:'花党'},{id:'lugb',n:'陆广白',ro:'离北边关大将',info:'离北军中重臣，性格沉稳刚毅。宫宴上挺身而出为沈泽川求情，代表的不是个人立场而是整个离北军方的态度。他的发言让花思谦一时语塞，也让朝堂看到了离北铁骑的分量。',fa:'离北军'},{id:'emperor',n:'咸德帝',ro:'大周天子',info:'名义上的天下之主，实则处处受太后掣肘。在沈泽川一案上态度暧昧——既不欲杀一个少年背负骂名，又不敢公然违逆太后。他真正的心思藏得很深。',fa:'皇室'},{id:'xiaoji',n:'萧既明',ro:'离北王长子',info:'萧驰野的兄长，离北实际的主事者。相比弟弟的张扬不羁，他更加稳重内敛，是离北真正的大脑。父王逝后一手支撑离北军政大局，默默为萧驰野的每一次行动创造条件。',fa:'离北军'},{id:'yaowy',n:'姚温玉',ro:'沈泽川智囊·冷面谋士',info:'心思缜密、算无遗策，沈泽川在阒都最倚重的智囊之一，助其查案破局、洗牌朝堂。',fa:'沈党'},{id:'xihx',n:'奚鸿轩',ro:'沈泽川臂助',info:'为沈泽川查中博案、缉私证的重要助力，忠直敢言。',fa:'沈党'},{id:'xuexz',n:'薛修卓',ro:'世家干才·劲敌',info:'工部出身的世家能臣，才干不逊沈泽川，是其在朝堂上的镜像与劲敌，立场几经转折。',fa:'世家'},{id:'hancheng',n:'韩丞',ro:'世家重臣',info:'阒都世家的中坚，屡与沈泽川在朝堂交锋。',fa:'世家'},{id:'kongqiu',n:'孔湫',ro:'世家清流',info:'讲究清谈门第的世家人物，态度暧昧多变。',fa:'世家'},{id:'panrg',n:'潘如贵',ro:'司礼监掌印·权阉',info:'昭罪寺与内廷的掌印太监，翻云覆雨的权阉，早年曾主审沈泽川。',fa:'内廷'},{id:'haily',n:'海良宜',ro:'端州赈务要员',info:'端州疫病赈务中的关键人物，与沈泽川并肩治世。',fa:'沈党'},{id:'lijt',n:'李剑霆',ro:'隐于皇嗣的女帝·淳圣帝',info:'大周皇嗣中的真身，终局登基为淳圣帝——大周数百年来第一位女帝。沈泽川辅其登基、摄理朝政。',fa:'皇室'},{id:'gaozx',n:'高仲雄',ro:'九年旧案关键人物',info:'牵涉九年前旧案，后成为沈泽川逼近真相、昭雪沈卫的助力。',fa:'沈党'}];

function startGame(cont){
  if(cont){if(!loadState())resetState();}else resetState();
  document.getElementById('cover').classList.add('out');
  setTimeout(()=>{
    document.getElementById('cover').style.display='none';
    g('exitb').style.display='block';g('rptg').style.display='flex';
    renderAll();switchTab('dossier');
  },600);
}
function backToCover(){saveState();g('cover').style.display='flex';g('cover').classList.remove('out');g('exitb').style.display='none';g('rptg').style.display='none';closeRP();g('cont-btn').style.display=localStorage.getItem(KEY)?'block':'none';}
function resetConfirm(){if(confirm('确定要清除所有存档重新开始吗？')){resetState();startGame(false);}}
function resetState(){Object.assign(S,{ac:'case_chashi',cs:'case_chashi_intro',aff:20,scr:0,cf:[],dm:[],dm2:{},ru:[],vs:[],cc:[],pov:'shen',attr:{shen:{quan:2,ren:3,wu:2,xin:2},xiao:{li:4,jue:3,mou:2,yi:3}},pts:0,hp:5,hpMax:5,items:[],found:[],investLog:[],day:1,energy:4,energyMax:4,dailyLog:[],dlg:{}});saveState();}
function g(id){return document.getElementById(id);}
function caseName(id){if(id==='case_ending')return '终章';var c=CASES.find(function(x){return x.id===id;});return c?c.n:'—';}
function caseRel(id){var c=CASES.find(function(x){return x.id===id;});return (c&&c.rel)?c.rel:'';}

// ============ POV ============
function switchPOV(p){
  if(S.pov===p)return;S.pov=p;saveState();
  document.querySelectorAll('#rp-povsw button').forEach(b=>b.classList.toggle('on',b.dataset.pov===p));
  document.body.className=p==='xiao'?'pov-xiao':'';
  updatePovNote();
  const active=document.querySelector('.tab.on');const t=active?active.dataset.tab:'dossier';
  if(t==='cultivation')renderCult();
  const rt=document.querySelector('#rpanel .rtab.on');
  if(g('rpanel').classList.contains('open')&&rt&&rt.dataset.rp==='contacts')renderRPContacts();

}
function updatePovNote(){
  const el=g('pov-note');if(!el)return;el.className=S.pov;

// ============ ATTRIBUTES ============
function addAttr(pov,obj){if(!obj)return;const a=S.attr[pov];for(const k in obj){a[k]=Math.min(ATTR_MAX,(a[k]||0)+obj[k]);}}
function attrTotal(pov){const a=S.attr[pov];return Object.values(a).reduce((x,y)=>x+y,0);}
function attrLevel(pov){const t=attrTotal(pov);const names=pov==='shen'?['待罪囚徒','蛰伏之蛇','暗蓄锋芒','权谋初成','翻云覆雨','暗阁之主']:['离北莽将','锋芒初露','谋勇并重','独当一面','离北砥柱','搅动风云'];const idx=Math.min(names.length-1,Math.floor((t-9)/6));return names[Math.max(0,idx)];}
function fmtAt(obj){if(!obj)return '';const nm=Object.assign({},...ATTR.shen.keys.map(k=>({[k.k]:k.n})),...ATTR.xiao.keys.map(k=>({[k.k]:k.n})));return Object.entries(obj).map(([k,v])=>`${nm[k]||k}+${v}`).join(' ');}
function meetReq(pov,req){if(!req)return true;const a=S.attr[pov];for(const k in req){if((a[k]||0)<req[k])return false;}return true;}
function meetNeed(need){if(!need)return true;return need.every(x=>S.cf.includes(x)||S.cc.includes(x));}
function fmtReq(req){const nm=Object.assign({},...ATTR.shen.keys.map(k=>({[k.k]:k.n})),...ATTR.xiao.keys.map(k=>({[k.k]:k.n})));return Object.entries(req).map(([k,v])=>`需${nm[k]||k}${v}`).join(' ');}

function renderCaseBar(){
  g('casebar').innerHTML=CASES.map(c=>{
    const a=S.ac===c.id,d=S.cc.includes(c.id);

  }).join('');
}
function renderSceneFilter(){
  const sel=g('sfilter'),sc=SSEQ[S.ac]||[];

function switchTab(name){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  const tb=document.querySelector(`[data-tab="${name}"]`);if(tb)tb.classList.add('on');
  document.querySelectorAll('.pnl').forEach(p=>p.classList.remove('on'));

  h+=`<h2>${sc.t}</h2>${sc.s?`<div class="cs">${sc.s}</div>`:''}<div class="nt">${sc.tx}</div>`;
  if(sc.cl&&sc.cl.length>0){
    h+=`<div class="cblock"><div class="clbl">🔍 现场勘查 · 点击逐一勘验线索</div><div class="inspect-grid">`;
    sc.cl.forEach(cid=>{const fnd=S.cf.includes(cid),c=CL[cid];h+=`<button class="insp${fnd?' got':''}" onclick="inspectClue('${cid}')">${fnd?'🔎 '+c.n:'❓ 待勘查'}</button>`;});
    h+=`</div><div id="insp-detail"></div></div>`;
  }
  if(sc.ch&&sc.ch.length>0){h+=`<div class="cblock"><div class="clbl">▸ 办案抉择</div>`;sc.ch.forEach((ch,i)=>{
    const rw=ch.at?`<span class="rw">${fmtAt(ch.at)}</span>`:(ch.ad?`<span class="rw">好感+${ch.ad}</span>`:'');
    h+=`<button class="dbtn" onclick="doChoice(${i})">${ch.t}${rw}</button>`;
  });h+=`</div>`;}h+=`</div>`;
  const nextCase=getNextCase(sc.c);

    h+=`<div style="text-align:center;padding:12px;margin-top:8px;border:1px dashed rgba(184,147,85,0.2);border-radius:2px;font-size:11px;color:rgba(255,255,255,0.4);letter-spacing:1px;cursor:pointer" onclick="selCase('${nextCase.id}');switchTab('dossier')">📂 发现新案卷：<span style="color:var(--gold)">${nextCase.n}</span> — 点击查阅</div>`;
  }
  el.innerHTML=h;renderSceneFilter();
}
function inspectClue(cid){
  const c=CL[cid];if(!c)return;
  if(!S.cf.includes(cid)){unlockC(cid);toast('🔎 勘得线索：'+c.n);}
  renderDossier();updateTopBar();
  const d=g('insp-detail');if(d)d.innerHTML=`<div class="insp-card"><b>🔎 ${c.n}</b><br>${c.d}</div>`;
}
function getNextCase(cur){const idx=CASES.findIndex(c=>c.id===cur);if(idx>=0&&idx<CASES.length-1)return CASES[idx+1];return null;}
function doChoice(i){
  const sc=SC[S.cs];if(!sc||!sc.ch[i])return;const ch=sc.ch[i];
  if(ch.pov){switchPOV(ch.pov);}
  if(ch.at){const povFor=(ch.pov)||S.pov;addAttr(povFor,ch.at);toast('📿 修为提升：'+fmtAt(ch.at));}
  if(ch.ad)S.aff=Math.max(0,Math.min(100,S.aff+ch.ad));S.scr+=10;S.pts=(S.pts||0)+1;toast('🎖 获得属性点 +1');
  if(ch.cc&&!S.cc.includes(ch.cc)){S.cc.push(ch.cc);RPTS.forEach(r=>{if(r.uc===ch.cc&&!S.ru.includes(r.id)){S.ru.push(r.id);toast('📨 新密函：'+r.ti);}});toast('✅ 案牍完结：'+sc.cn);}
  if(ch.rst){resetState();renderAll();switchTab('dossier');return;}
  if(ch.n)S.dm2[sc.c]=ch.n;
  S.vs=[...new Set([...S.vs,S.cs])];S.cs=ch.nx;
  if(SC[ch.nx])S.ac=SC[ch.nx].c;saveState();renderAll();switchTab('dossier');
}

function updateTopBar(){
  const cn=new Proxy({},{get:function(t,k){return caseName(k);}});
  g('tp-case').textContent=cn[S.ac]||'无';g('tp-score').textContent=S.scr;g('tp-clues').textContent=S.cf.length+'/'+Object.keys(CL).length;g('tp-hp').textContent=(S.hp==null?5:S.hp);var _it=g('tp-items');if(_it)_it.textContent=(S.items||[]).length;
}
function updateBottomBar(){
  const c=S.cc.length;g('bb-sit').textContent=c===0?'风平浪静':c<=3?'暗流涌动':c<=6?'山雨欲来':c<=9?'风云际会':'天下将定';
  g('bb-aff').textContent=S.aff<=25?'敌意':S.aff<=45?'注意':S.aff<=65?'好奇':S.aff<=85?'羁绊':'纠缠';
  g('bb-prog').textContent=Math.round(c/10*100)+'%';
}
function toast(msg){const ct=document.getElementById('toast-ctn'),t=document.createElement('div');t.className='toast';t.textContent=msg;ct.appendChild(t);setTimeout(()=>t.remove(),2500);}
function saveState(){try{localStorage.setItem(KEY,JSON.stringify(S));}catch(e){}}
function loadState(){try{const r=localStorage.getItem(KEY);if(r){const o=JSON.parse(r);if(!o.attr)o.attr={shen:{quan:2,ren:3,wu:2,xin:2},xiao:{li:4,jue:3,mou:2,yi:3}};if(!o.dlg)o.dlg={};if(!o.pov)o.pov='shen';if(o.pts==null)o.pts=0;if(o.hpMax==null)o.hpMax=5;if(o.hp==null)o.hp=o.hpMax;if(!o.items)o.items=[];if(!o.found)o.found=[];if(!o.investLog)o.investLog=[];if(o.day==null)o.day=1;if(o.energyMax==null)o.energyMax=4;if(o.energy==null)o.energy=o.energyMax;if(!o.dailyLog)o.dailyLog=[];if(o.dlg){for(const k in o.dlg){const e=o.dlg[k];if(e&&(('node' in e)||('ended' in e))){o.dlg={};break;}}}Object.assign(S,o);return true;}}catch(e){}return false;}

// ============ BG PARTICLES ============
(function(){const cv=g('bg-canvas'),cx=cv.getContext('2d');let W,H;function rs(){W=cv.width=innerWidth;H=cv.height=innerHeight;}rs();addEventListener('resize',rs);const pts=[];for(let i=0;i<30;i++)pts.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*30+10,s:Math.random()*0.06+0.03,o:Math.random()*0.012+0.003,ph:Math.random()*Math.PI*2});(function a(){cx.clearRect(0,0,W,H);const t=Date.now()*0.0003;pts.forEach(p=>{p.y+=p.s;if(p.y>H+40){p.y=-40;p.x=Math.random()*W;}const oo=p.o+Math.sin(t+p.ph)*0.005,gr=cx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r);gr.addColorStop(0,`rgba(180,147,85,${oo*1.5})`);gr.addColorStop(1,'rgba(180,147,85,0)');cx.fillStyle=gr;cx.beginPath();cx.arc(p.x,p.y,p.r,0,Math.PI*2);cx.fill();});requestAnimationFrame(a);})();})();

// ============ INIT ============
g('cont-btn').style.display=localStorage.getItem(KEY)?'block':'none';
g('exitb').style.display='none';g('rptg').style.display='none';
document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>switchTab(t.dataset.tab)));
console.log('🏛️ 将进酒·暗阁 v12 分支抉择·封面精简 — 查案/生命值/道具/剧情解锁对话 就绪');
(function(){try{const gc=new URLSearchParams(location.search).get('case');if(gc&&CASES.some(c=>c.id===gc)){startGame(true);setTimeout(()=>{selCase(gc);switchTab('dossier');toast('🗺 已从大地图进入：'+(CASES.find(c=>c.id===gc).n));},650);}}catch(e){}})();
window.addEventListener('message',function(e){var d=e&&e.data;if(d&&d.type==='qjj-goto'&&d.case&&CASES.some(c=>c.id===d.case)){selCase(d.case);switchTab('dossier');toast('🗺 已从大地图进入：'+(CASES.find(c=>c.id===d.case).n));}});
</script>
